<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - النسخة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f7ff; }
        .chat-bg { background-color: #e3f2fd; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        .tab-active { border-bottom: 3px solid #ffffff; color: #ffffff; }
        .msg-bubble { cursor: pointer; transition: 0.2s; position: relative; max-width: 85%; }
        .bg-royal-blue { background-color: #1e40af; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-royal-blue text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-4 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
            <button onclick="showSection('nearby')"><i class="fas fa-radar text-xl"></i></button>
        </div>
    </header>

    <nav class="bg-royal-blue text-blue-100 shadow flex justify-around font-bold z-40">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 px-2 flex-1 tab-active">القريبين</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 px-2 flex-1">دردشة</button>
        <button onclick="showSection('status')" id="tab-status" class="py-3 px-2 flex-1">حالات</button>
        <button onclick="showSection('calls')" id="tab-calls" class="py-3 px-2 flex-1">مكالمات</button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-20">
        <section id="section-chats" class="divide-y">
            <div onclick="openChat('أحمد')" class="flex items-center p-4 bg-white hover:bg-blue-50 cursor-pointer">
                <img src="https://ui-avatars.com/api/?name=Ahmed&background=1e40af&color=fff" class="w-14 h-14 rounded-full ml-4">
                <div class="flex-1 text-right">
                    <div class="flex justify-between"><h4 class="font-bold">أحمد</h4><span class="text-xs text-gray-400">الآن</span></div>
                    <p class="text-sm text-gray-500">اضغط لبدء الاتصال الحقيقي</p>
                </div>
            </div>
        </section>

        <section id="section-nearby" class="hidden p-4">رادار القريبين نشط...</section>
        <section id="section-status" class="hidden p-4">لا توجد حالات...</section>
        <section id="section-profile" class="hidden p-4">ملف نبيل الشخصي</section>
        <section id="section-calls" class="hidden p-4 text-center text-gray-400 mt-10">
            <i class="fas fa-phone-slash text-5xl mb-3"></i>
            <p>سجل المكالمات فارغ</p>
        </section>
    </main>

    <div id="chat-win" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-royal-blue text-white p-4 flex items-center">
            <button onclick="closeChat()" class="ml-4 text-xl"><i class="fas fa-arrow-right"></i></button>
            <img id="chat-avatar" src="" class="w-10 h-10 rounded-full ml-3 border">
            <h4 id="chat-title" class="font-bold flex-1 text-right">أحمد</h4>
            <div class="flex space-x-6 space-x-reverse mr-4">
                <button onclick="initiateCall('صوتية')"><i class="fas fa-phone"></i></button>
                <button onclick="initiateCall('فيديو')"><i class="fas fa-video"></i></button>
            </div>
        </header>
        <div id="chat-box" class="flex-1 p-4 overflow-y-auto chat-bg flex flex-col"></div>
        <footer class="p-3 bg-white border-t flex items-center gap-2">
            <input id="msg-input" type="text" placeholder="اكتب رسالة..." class="flex-1 p-3 bg-gray-100 rounded-2xl text-right outline-none">
            <button onclick="sendMsg()" class="bg-blue-700 text-white w-12 h-12 rounded-full flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </div>

    <div id="call-screen" class="fixed inset-0 bg-royal-blue z-[300] hidden flex flex-col items-center justify-center text-white">
        <div class="text-center animate-pulse">
            <img id="call-img" src="" class="w-32 h-32 rounded-full border-4 border-white/30 mb-6 shadow-2xl">
            <h2 id="call-contact-name" class="text-3xl font-bold">الاسم</h2>
            <p id="call-type" class="text-lg opacity-80 mt-2">جاري الاتصال...</p>
        </div>
        
        <div class="absolute bottom-20 flex space-x-10 space-x-reverse">
            <button class="bg-white/10 p-5 rounded-full backdrop-blur-md"><i class="fas fa-microphone-slash text-2xl"></i></button>
            <button onclick="endCall()" class="bg-red-500 p-6 rounded-full shadow-2xl hover:scale-110 transition-transform"><i class="fas fa-phone-slash text-3xl"></i></button>
            <button class="bg-white/10 p-5 rounded-full backdrop-blur-md"><i class="fas fa-video-slash text-2xl"></i></button>
        </div>
    </div>

    <script>
        // وظائف التنقل
        function showSection(id) {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id)?.classList.add('tab-active');
        }

        // وظائف الدردشة
        function openChat(name) {
            document.getElementById('chat-win').classList.remove('hidden');
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-avatar').src = "https://ui-avatars.com/api/?name=" + name + "&background=1e40af&color=fff";
        }

        function closeChat() { document.getElementById('chat-win').classList.add('hidden'); }

        // --- وظائف الاتصال الحقيقية ---
        function initiateCall(type) {
            const name = document.getElementById('chat-title').innerText;
            const avatar = document.getElementById('chat-avatar').src;

            // تحديث بيانات شاشة الاتصال
            document.getElementById('call-contact-name').innerText = name;
            document.getElementById('call-img').src = avatar;
            document.getElementById('call-type').innerText = `مكالمة ${type} مشفرة...`;

            // إظهار الشاشة
            document.getElementById('call-screen').classList.remove('hidden');
            
            // إضافة صوت رنين وهمي
            console.log("Starting call to " + name);
        }

        function endCall() {
            document.getElementById('call-screen').classList.add('hidden');
            alert("تم إنهاء المكالمة");
        }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()){
                const box = document.getElementById('chat-box');
                const msg = document.createElement('div');
                msg.className = "self-start bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none ml-auto mb-2 text-right shadow-sm";
                msg.innerHTML = inp.value + `<span class="block text-[8px] opacity-70">الآن</span>`;
                box.appendChild(msg);
                inp.value = "";
                box.scrollTop = box.scrollHeight;
            }
        }
    </script>
</body>
</html>
