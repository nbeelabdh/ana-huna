<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; }
        .tab-active { border-bottom: 3px solid #128c7e; color: #128c7e; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .section-content { display: none; }
        .section-content.active { display: block; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-[#075E54] text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-4 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
            <button><i class="fas fa-search text-xl"></i></button>
            <button class="relative" onclick="alert('القائمة')">
                <i class="fas fa-ellipsis-v text-xl"></i>
            </button>
        </div>
    </header>

    <nav class="bg-white shadow flex justify-around text-gray-500 font-bold z-40">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 px-2 flex-1 tab-active"><i class="fas fa-map-marker-alt ml-2"></i>القريبين</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 px-2 flex-1"><i class="fas fa-comment ml-2"></i>دردشة</button>
        <button onclick="showSection('status')" id="tab-status" class="py-3 px-2 flex-1"><i class="fas fa-circle-notch ml-2"></i>حالات</button>
        <button onclick="showSection('calls')" id="tab-calls" class="py-3 px-2 flex-1"><i class="fas fa-phone ml-2"></i>مكالمات</button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-20">
        
        <section id="section-nearby" class="section-content active p-4 space-y-4">
            <div class="bg-blue-100 p-4 rounded-xl flex items-center justify-between">
                <div>
                    <h3 class="font-bold text-blue-800 text-right">رادار القريبين نشط</h3>
                    <p class="text-sm text-blue-600 text-right">يتم عرض الأشخاص والمنشآت في نطاق 5 كم</p>
                </div>
                <button onclick="alert('جاري تحديث الموقع...')" class="bg-blue-500 text-white p-2 rounded-full"><i class="fas fa-sync"></i></button>
            </div>

            <div class="space-y-3">
                <div class="bg-white p-3 rounded-xl shadow-sm flex items-center justify-between border-r-4 border-green-500">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center text-xl font-bold text-white">ن</div>
                        <div class="mr-3 text-right">
                            <h4 class="font-bold">نبيل (أنت)</h4>
                            <p class="text-xs text-green-500 font-bold">نشط الآن</p>
                        </div>
                    </div>
                    <span class="text-xs text-gray-400">0 كم</span>
                </div>
            </div>
        </section>

        <section id="section-chats" class="section-content">
            <div class="divide-y">
                <div onclick="openChat('أحمد')" class="flex items-center p-4 bg-white hover:bg-gray-50 cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name=Ahmed&background=random" class="w-14 h-14 rounded-full ml-4">
                    <div class="flex-1 text-right">
                        <div class="flex justify-between">
                            <h4 class="font-bold">أحمد</h4>
                            <span class="text-xs text-gray-400">10:30 ص</span>
                        </div>
                        <p class="text-sm text-gray-500 truncate text-right">هل أرسلت لي موقع المنشأة؟</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-status" class="section-content p-10 text-center text-gray-400">
            <i class="fas fa-circle-notch text-5xl mb-4"></i>
            <p>لا توجد حالات جديدة حالياً</p>
        </section>

        <section id="section-calls" class="section-content p-10 text-center text-gray-400">
            <i class="fas fa-phone-slash text-5xl mb-4"></i>
            <p>سجل المكالمات فارغ</p>
        </section>

        <section id="section-profile" class="section-content p-6 text-center">
            <div class="relative inline-block">
                <img id="profile-pic" src="https://ui-avatars.com/api/?name=Nabeel&size=128" class="w-32 h-32 rounded-full border-4 border-white shadow mx-auto">
                <button onclick="document.getElementById('img-input').click()" class="absolute bottom-0 left-0 bg-green-500 text-white p-2 rounded-full shadow-md"><i class="fas fa-camera"></i></button>
                <input type="file" id="img-input" class="hidden" accept="image/*" onchange="updateProfileImg(event)">
            </div>
            <h2 class="text-2xl font-bold mt-4">نبيل</h2>
            <p class="text-gray-500">أهلاً بك في "أنا هنا"</p>
        </section>

    </main>

    <div class="fixed bottom-24 left-6 flex flex-col space-y-3">
        <button onclick="showCreateGroup()" class="bg-[#128c7e] text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center">
            <i class="fas fa-users"></i>
        </button>
        <button onclick="showAddEntity()" class="bg-orange-500 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center">
            <i class="fas fa-plus-square"></i>
        </button>
    </div>

    <div id="chat-window" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center">
            <button onclick="closeChat()" class="ml-4 text-xl"><i class="fas fa-arrow-right"></i></button>
            <img id="chat-avatar" src="" class="w-10 h-10 rounded-full ml-3">
            <div class="flex-1 text-right">
                <h4 id="chat-name" class="font-bold">اسم الشخص</h4>
                <p class="text-xs opacity-75">نشط الآن</p>
            </div>
        </header>
        <div id="chat-content" class="flex-1 p-4 overflow-y-auto chat-bg flex flex-col space-y-4">
            </div>
        <footer class="p-2 bg-gray-100 flex items-center space-x-2 space-x-reverse">
            <input id="chat-input" type="text" placeholder="اكتب رسالة..." class="flex-1 p-2 rounded-full border focus:outline-none text-right">
            <button onclick="sendMessage()" class="bg-[#075E54] text-white p-2 rounded-full w-10 h-10 flex items-center justify-center">
                <i class="fas fa-paper-plane"></i>
            </button>
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 z-[200] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 space-y-4">
            <h3 id="modal-title" class="text-xl font-bold text-right">عنوان</h3>
            <div id="modal-body"></div>
            <div class="flex justify-end space-x-2 space-x-reverse">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-500">إلغاء</button>
                <button onclick="confirmModal()" class="px-4 py-2 bg-green-500 text-white rounded-lg">تأكيد</button>
            </div>
        </div>
    </div>

    <script>
        // دالة التنقل الرئيسية
        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id)?.classList.add('tab-active');
        }

        // الدردشة
        function openChat(name) {
            document.getElementById('chat-name').innerText = name;
            document.getElementById('chat-avatar').src = "https://ui-avatars.com/api/?name=" + name;
            document.getElementById('chat-window').classList.remove('hidden');
        }
        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if(input.value.trim()){
                const chatContent = document.getElementById('chat-content');
                const msgDiv = document.createElement('div');
                msgDiv.className = "self-start bg-[#dcf8c6] p-3 rounded-lg shadow-sm max-w-[80%] text-sm text-right";
                msgDiv.innerText = input.value;
                chatContent.appendChild(msgDiv);
                input.value = "";
                chatContent.scrollTop = chatContent.scrollHeight;
            }
        }

        // إنشاء منشأة وجروب
        function showAddEntity() {
            document.getElementById('modal-title').innerText = "إضافة منشأة جديدة";
            document.getElementById('modal-body').innerHTML = `
                <input type="text" placeholder="اسم المنشأة" class="w-full border p-3 rounded-lg mb-3 text-right">
                <select class="w-full border p-3 rounded-lg mb-3 text-right">
                    <option>مطعم</option><option>محل تجاري</option><option>مكتب خدمات</option>
                </select>`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function showCreateGroup() {
            document.getElementById('modal-title').innerText = "إنشاء مجموعة جديدة";
            document.getElementById('modal-body').innerHTML = `
                <input type="text" placeholder="اسم المجموعة" class="w-full border p-3 rounded-lg mb-3 text-right">
                <div class="flex items-center text-sm text-gray-500 justify-end">
                    مجموعة عامة <input type="checkbox" class="mr-2">
                </div>`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function confirmModal() { alert('تمت العملية بنجاح'); closeModal(); }

        // الملف الشخصي
        function updateProfileImg(e) {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('profile-pic').src = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        }
    </script>
</body>
</html>
