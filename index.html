<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق أنا هنا - Ana Huna</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --main-color: #075e54; --bg-color: #e5ddd5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* الهيدر */
        .header { background: var(--main-color); color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* الرادار (الأشخاص القريبين) */
        .radar-section { background: white; padding: 10px; display: flex; gap: 15px; overflow-x: auto; border-bottom: 1px solid #ddd; min-height: 80px; align-items: center; }
        .user-node { text-align: center; min-width: 60px; }
        .avatar { width: 45px; height: 45px; background: #25d366; border-radius: 50%; margin: 0 auto; border: 2px solid var(--main-color); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .user-name { font-size: 11px; margin-top: 4px; color: #333; }

        /* منطقة الدردشة */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 15px; position: relative; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .my-msg { background: #dcf8c6; align-self: flex-start; border-bottom-right-radius: 2px; }
        .others-msg { background: white; align-self: flex-end; border-bottom-left-radius: 2px; }
        .delete-btn { display: block; font-size: 10px; color: #e74c3c; margin-top: 5px; cursor: pointer; text-align: left; font-weight: bold; }

        /* صندوق الإدخال */
        .input-area { background: #f0f0f0; padding: 10px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid #ccc; }
        .row-1 { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        button.send-btn { background: var(--main-color); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        
        .row-2 { display: flex; justify-content: space-around; background: #fff; padding: 8px; border-radius: 10px; }
        .tool-btn { background: none; border: none; font-size: 22px; cursor: pointer; filter: grayscale(0.5); transition: 0.3s; }
        .tool-btn:hover { filter: grayscale(0); transform: scale(1.1); }
    </style>
</head>
<body>

<div class="header">تطبيق أنا هنا - Ana Huna</div>

<div class="radar-section" id="radarList">
    <div class="user-node"><div class="avatar">?</div><div class="user-name">جارِ البحث..</div></div>
</div>

<div id="chat-window"></div>

<div class="input-area">
    <div class="row-1">
        <input type="text" id="textInput" placeholder="اكتب رسالتك يا نبيل...">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
    <div class="row-2">
        <button class="tool-btn" onclick="sendLoc()" title="إرسال موقعي">📍</button>
        <button class="tool-btn" onclick="alert('سيتم تفعيل المجموعات قريباً')" title="إنشاء مجموعة">👥</button>
        <button class="tool-btn" onclick="alert('ميزة الصوت ستحتاج ربط التخزين مستقبلاً')" title="رسالة صوتية">🎤</button>
        <button class="tool-btn" onclick="changeStatus()" title="تحديث حالتي">📝</button>
    </div>
</div>

<script>
    // --- إعدادات فايربيس (انسخ بياناتك من Firebase Console وضعها هنا) ---
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "anahuna-bc15f.firebaseapp.com",
        databaseURL: "https://anahuna-bc15f-default-rtdb.firebaseio.com",
        projectId: "anahuna-bc15f",
        storageBucket: "anahuna-bc15f.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // تعريف المستخدم الحالي (يمكنك تطوير نظام تسجيل دخول لاحقاً)
    const userId = "user_" + Math.floor(Math.random() * 10000);
    const myName = "نبيل";

    // 1. تحديث الموقع في الرادار (تلقائياً عند فتح التطبيق)
    function trackLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                db.ref('presence/' + userId).set({
                    name: myName,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    lastActive: Date.now()
                });
            });
        }
    }

    // استلام بيانات الرادار وعرضها لكل الناس
    db.ref('presence').on('value', snap => {
        const list = document.getElementById('radarList');
        list.innerHTML = "";
        snap.forEach(child => {
            const user = child.val();
            list.innerHTML += `
                <div class="user-node">
                    <div class="avatar" style="background:${child.key === userId ? '#075e54' : '#25d366'}">${user.name.charAt(0)}</div>
                    <div class="user-name">${user.name}</div>
                </div>`;
        });
    });

    // 2. إرسال واستقبال الرسائل
    function sendMsg() {
        const inp = document.getElementById('textInput');
        if (inp.value.trim() !== "") {
            db.ref('messages').push({
                uId: userId,
                uName: myName,
                msg: inp.value,
                time: Date.now()
            });
            inp.value = "";
        }
    }

    // حذف الرسالة للجميع (الميزة التي طلبتها)
    function killMsg(key) {
        if(confirm("هل تريد حذف هذه الرسالة من عند الجميع؟")) {
            db.ref('messages/' + key).remove();
        }
    }

    // عرض الرسائل فور وصولها (Live Update)
    db.ref('messages').on('child_added', snap => {
        const data = snap.val();
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.id = snap.key;
        div.className = `bubble ${data.uId === userId ? 'my-msg' : 'others-msg'}`;
        div.innerHTML = `
            <strong>${data.uName}</strong><br>${data.msg}
            ${data.uId === userId ? `<span class="delete-btn" onclick="killMsg('${snap.key}')">حذف للكل 🗑️</span>` : ''}
        `;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    });

    // إخفاء الرسالة فور حذفها عند أي شخص
    db.ref('messages').on('child_removed', snap => {
        const el = document.getElementById(snap.key);
        if(el) el.remove();
    });

    // 3. إرسال الموقع الجغرافي
    function sendLoc() {
        navigator.geolocation.getCurrentPosition(pos => {
            const url = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            db.ref('messages').push({
                uId: userId,
                uName: myName,
                msg: "📍 موقعي الحالي: " + url,
                time: Date.now()
            });
        });
    }

    // 4. تغيير الحالة (Status)
    function changeStatus() {
        const s = prompt("ماذا يدور في ذهنك؟");
        if(s) {
            db.ref('presence/' + userId + '/status').set(s);
            alert("تم تحديث حالتك!");
        }
    }

    // بدء تتبع الموقع عند التشغيل
    trackLocation();
</script>

</body>
</html>
