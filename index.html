<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Blue Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .chat-bg { background-color: #e5e7eb; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        .tab-active { border-bottom: 3px solid #1e40af; color: #1e40af; }
        .section-content { display: none; height: 100%; }
        .section-content.active { display: block; }
        .msg-bubble { cursor: pointer; transition: 0.2s; position: relative; }
        .blue-gradient { background: linear-gradient(135deg, #1e40af, #3b82f6); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="blue-gradient text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold italic tracking-wider">أنا هنا</h1>
        <div class="flex space-x-4 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
            <button onclick="showCallMenu('عام')"><i class="fas fa-phone-alt text-xl"></i></button>
            <button onclick="toggleMenu()"><i class="fas fa-bars text-xl"></i></button>
        </div>
    </header>

    <nav class="bg-white shadow flex justify-around text-gray-500 font-bold z-40 border-b">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 flex-1 tab-active">الرادار</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 flex-1">المحادثات</button>
        <button onclick="showSection('status')" id="tab-status" class="py-3 flex-1">الحالات</button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-24">
        
        <section id="section-nearby" class="section-content active p-4 space-y-4">
            <div class="bg-blue-50 border border-blue-200 p-4 rounded-2xl flex items-center justify-between">
                <div class="text-right">
                    <h3 class="font-bold text-blue-900">الأشخاص القريبين</h3>
                    <p class="text-xs text-blue-600">اكتشف مطورين ومستخدمين حولك</p>
                </div>
                <i class="fas fa-satellite-dish text-blue-500 animate-pulse text-2xl"></i>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between border-r-4 border-blue-600">
                <div class="flex items-center">
                    <img id="my-avatar-nearby" src="https://ui-avatars.com/api/?name=Nabil&background=1e40af&color=fff" class="w-12 h-12 rounded-full">
                    <div class="mr-3 text-right">
                        <h4 class="font-bold">نبيل (أنت)</h4>
                        <span class="text-[10px] text-blue-500 font-bold">نشط بمكة</span>
                    </div>
                </div>
                <button onclick="openChat('أحمد')" class="bg-blue-600 text-white p-3 rounded-full shadow-lg"><i class="fas fa-comment"></i></button>
            </div>
        </section>

        <section id="section-chats" class="section-content">
            <div class="bg-gray-100 p-2 text-right text-xs font-bold text-gray-500 border-b">المجموعات</div>
            <div onclick="openChat('جروب المبرمجين', true)" class="flex items-center p-4 bg-white border-b cursor-pointer hover:bg-blue-50">
                <div id="group-img-display" class="w-14 h-14 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-xl ml-4">
                    <i class="fas fa-users"></i>
                </div>
                <div class="flex-1 text-right">
                    <h4 id="group-name-display" class="font-bold">جروب المبرمجين 💻</h4>
                    <p class="text-xs text-gray-400">انقر لتعديل بيانات الجروب أو الدردشة</p>
                </div>
                <button onclick="event.stopPropagation(); manageGroup()" class="text-blue-600 p-2"><i class="fas fa-edit"></i></button>
            </div>

            <div class="bg-gray-100 p-2 text-right text-xs font-bold text-gray-500 border-b">المحادثات</div>
            <div onclick="openChat('أحمد')" class="flex items-center p-4 bg-white border-b cursor-pointer">
                <img src="https://ui-avatars.com/api/?name=Ahmed" class="w-14 h-14 rounded-full ml-4">
                <div class="flex-1 text-right">
                    <h4 class="font-bold
