<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-[#075E54] text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-4 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
        </div>
    </header>

    <nav class="bg-white shadow flex justify-around text-gray-500 font-bold z-40">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 flex-1 border-b-2 border-transparent active:border-[#128c7e]">القريبين</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 flex-1">دردشة</button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-20">
        <section id="section-profile" class="p-6 text-center space-y-6">
            <div class="relative inline-block">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=Nabeel" class="w-32 h-32 rounded-full border-4 border-white shadow">
                <input type="file" id="mediaInput" class="hidden" onchange="handleFileUpload(this.files[0])">
                <button onclick="document.getElementById('mediaInput').click()" class="absolute bottom-0 left-0 bg-blue-500 text-white p-2 rounded-full shadow-lg">
                    <i class="fas fa-cloud-upload-alt"></i>
                </button>
            </div>
            <div class="text-sm text-gray-500">اضغط لرفع: صورة، صوت، أو فيديو إلى السحابة</div>
            <div id="uploadStatus" class="text-green-600 font-bold"></div>
        </section>

        <section id="section-chats" class="hidden divide-y">
            <div onclick="openChat('أحمد')" class="flex items-center p-4 bg-white cursor-pointer">
                <img src="https://ui-avatars.com/api/?name=A" class="w-12 h-12 rounded-full">
                <div class="mr-3">
                    <h4 class="font-bold">أحمد</h4>
                    <p class="text-sm text-gray-500">اضغط لبدء مكالمة فيديو أو صوت</p>
                </div>
            </div>
        </section>
    </main>

    <div id="chat-window" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center justify-between">
            <div class="flex items-center">
                <button onclick="closeChat()" class="ml-4"><i class="fas fa-arrow-right"></i></button>
                <h4 id="chat-name" class="font-bold">أحمد</h4>
            </div>
            <div class="flex space-x-6 space-x-reverse">
                <button onclick="startCall('صوتية')"><i class="fas fa-phone text-xl"></i></button>
                <button onclick="startCall('فيديو')"><i class="fas fa-video text-xl"></i></button>
            </div>
        </header>
        <div class="flex-1 chat-bg p-4" id="chat-messages">
            <div class="bg-white p-2 rounded shadow-sm w-fit text-sm">أهلاً بك في نظام "أنا هنا" السحابي</div>
        </div>
    </div>

    <div id="call-screen" class="fixed inset-0 bg-slate-900 z-[200] hidden flex flex-col items-center justify-center text-white">
        <div class="w-32 h-32 bg-green-500 rounded-full flex items-center justify-center mb-6 animate-pulse">
            <i class="fas fa-user text-5xl"></i>
        </div>
        <h2 id="call-type" class="text-2xl font-bold mb-2">جاري الاتصال...</h2>
        <div class="flex space-x-8 space-x-reverse mt-10">
            <button onclick="endCall()" class="bg-red-500 p-6 rounded-full"><i class="fas fa-phone-slash text-2xl"></i></button>
        </div>
    </div>

    <script>
        // --- إعدادات Appwrite الخاصة بك يا نبيل ---
        const sdk = new Appwrite.Client()
            .setEndpoint('https://fra.cloud.appwrite.io/v1')
            .setProject('69ba1fa10035b7f1de96');

        const storage = new Appwrite.Storage(sdk);
        const account = new Appwrite.Account(sdk);

        // تسجيل دخول تلقائي لتمكين الميزات
        async function init() {
            try { await account.createAnonymousSession(); } catch(e) {}
        }
        init();

        // دالة الرفع السحابي (صور، فيديو، صوت)
        async function handleFileUpload(file) {
            if(!file) return;
            const status = document.getElementById('uploadStatus');
            status.innerText = "جاري الرفع للسحابة...";
            
            try {
                const res = await storage.createFile(
                    '69ba233f001368959e2e', // تأكد أن هذا هو الـ Bucket ID الصحيح
                    'unique()',
                    file
                );
                status.innerText = "✅ تم الرفع بنجاح!";
                alert("تم تخزين الملف في سحابة Appwrite بنجاح");
            } catch (error) {
                console.error(error);
                status.innerText = "❌ فشل الرفع (تأكد من الأذونات)";
            }
        }

        // التحكم في الواجهة
        function showSection(id) {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
        }

        function openChat(name) {
            document.getElementById('chat-name').innerText = name;
            document.getElementById('chat-window').classList.remove('hidden');
        }

        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }

        // محاكاة المكالمات (تتطلب WebRTC للعمل الحقيقي)
        function startCall(type) {
            document.getElementById('call-type').innerText = "مكالمة " + type + " جارية...";
            document.getElementById('call-screen').classList.remove('hidden');
        }

        function endCall() { document.getElementById('call-screen').classList.add('hidden'); }
    </script>
</body>
</html>
