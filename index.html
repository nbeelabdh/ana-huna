<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; }
        .tab-active { border-bottom: 3px solid #075E54; color: #075E54; }
        .section-content { display: none; }
        .section-content.active { display: block; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-[#075E54] text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-4 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
            <button><i class="fas fa-search text-xl"></i></button>
            <button onclick="alert('القائمة')"><i class="fas fa-ellipsis-v text-xl"></i></button>
        </div>
    </header>

    <nav class="bg-white shadow flex justify-around text-gray-500 font-bold z-40">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 px-2 flex-1 tab-active">القريبين</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 px-2 flex-1">دردشة</button>
        <button onclick="showSection('status')" id="tab-status" class="py-3 px-2 flex-1">حالات</button>
        <button onclick="showSection('calls')" id="tab-calls" class="py-3 px-2 flex-1 text-green-700"><i class="fas fa-phone"></i></button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-20">
        <section id="section-nearby" class="section-content active p-4">
             <div class="bg-white p-4 rounded-xl shadow-sm border-r-4 border-green-500 flex justify-between items-center">
                <div>
                    <h4 class="font-bold">نبيل (أنت)</h4>
                    <p class="text-xs text-green-500 font-bold">نشط الآن • متصل بالرادار</p>
                </div>
                <i class="fas fa-satellite-dish text-green-500 animate-pulse"></i>
            </div>
        </section>

        <section id="section-chats" class="section-content">
            <div onclick="openChat('أحمد')" class="flex items-center p-4 bg-white border-b cursor-pointer">
                <img src="https://ui-avatars.com/api/?name=Ahmed&background=random" class="w-14 h-14 rounded-full ml-4">
                <div class="flex-1 text-right">
                    <h4 class="font-bold">أحمد</h4>
                    <p class="text-sm text-gray-500">اضغط لإرسال الموقع أو الصور..</p>
                </div>
            </div>
        </section>

        <section id="section-calls" class="section-content p-4 text-center">
            <p class="text-gray-400">سجل المكالمات فارغ</p>
        </section>

        <section id="section-status" class="section-content p-4 text-center">
            <p class="text-gray-400">لا توجد حالات</p>
        </section>

        <section id="section-profile" class="section-content p-6 text-center">
            <div class="relative inline-block">
                <img id="profile-img" src="https://ui-avatars.com/api/?name=Nabeel&size=128" class="w-32 h-32 rounded-full border-4 border-white shadow-lg">
                <button onclick="document.getElementById('profile-file').click()" class="absolute bottom-0 left-0 bg-green-500 text-white p-2 rounded-full shadow-lg">
                    <i class="fas fa-camera"></i>
                </button>
                <input type="file" id="profile-file" class="hidden" accept="image/*" onchange="updateProfilePic(event)">
            </div>
            <h2 class="text-2xl font-bold mt-4 text-gray-800">نبيل</h2>
        </section>
    </main>

    <div id="chat-window" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center">
            <button onclick="closeChat()" class="ml-4 text-xl"><i class="fas fa-arrow-right"></i></button>
            <h4 id="chat-name" class="font-bold">أحمد</h4>
        </header>

        <div id="chat-content" class="flex-1 p-4 overflow-y-auto chat-bg flex flex-col space-y-3">
            </div>

        <footer class="p-2 bg-gray-100 flex items-center gap-2 border-t shadow-inner">
            <button onclick="document.getElementById('chat-file').click()" class="text-gray-600 p-2"><i class="fas fa-paperclip text-xl"></i></button>
            <input type="file" id="chat-file" class="hidden" accept="image/*" onchange="sendImage(event)">
            
            <input id="msg-input" type="text" placeholder="اكتب رسالة..." class="flex-1 p-2 rounded-full border focus:outline-none bg-white">
            
            <button onclick="sendLocation()" class="text-red-500 p-2"><i class="fas fa-map-marker-alt text-xl"></i></button>
            <button onmousedown="startRecord()" onmouseup="stopRecord()" class="text-green-600 p-2"><i class="fas fa-microphone text-xl"></i></button>
            <button onclick="sendMessage()" class="bg-[#075E54] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
                <i class="fas fa-paper-plane"></i>
            </button>
        </footer>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id)?.classList.add('tab-active');
        }

        function openChat(name) {
            document.getElementById('chat-window').classList.remove('hidden');
        }

        function closeChat() {
            document.getElementById('chat-window').classList.add('hidden');
        }

        function appendMessage(content, isSelf = true) {
            const chatContent = document.getElementById('chat-content');
            const msgDiv = document.createElement('div');
            msgDiv.className = `max-w-[80%] p-3 rounded-xl shadow-sm text-sm ${isSelf ? 'bg-[#dcf8c6] self-start' : 'bg-white self-end text-right'}`;
            msgDiv.innerHTML = content;
            chatContent.appendChild(msgDiv);
            chatContent.scrollTop = chatContent.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (input.value.trim() !== "") {
                appendMessage(input.value);
                input.value = "";
            }
        }

        function sendImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    appendMessage(`<img src="${e.target.result}" class="rounded-lg max-h-48 w-full object-cover">`);
                }
                reader.readAsDataURL(file);
            }
        }

        function sendLocation() {
            if (navigator.geolocation) {
                appendMessage("<i class='fas fa-spinner animate-spin'></i> جاري جلب الموقع...");
                navigator.geolocation.getCurrentPosition((pos) => {
                    const mapUrl = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    appendMessage(`<a href="${mapUrl}" target="_blank" class="text-blue-600 underline"><i class="fas fa-map-marked-alt"></i> موقعي الحالي على الخريطة</a>`);
                }, () => alert("يرجى تفعيل الموقع"));
            }
        }

        function startRecord() { document.getElementById('msg-input').placeholder = "جاري التسجيل... 🔴"; }
        function stopRecord() { 
            document.getElementById('msg-input').placeholder = "اكتب رسالة...";
            appendMessage("<i class='fas fa-microphone text-green-600'></i> رسالة صوتية (تجريبية)");
        }

        function updateProfilePic(e) {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('profile-img').src = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        }
    </script>
</body>
</html>
