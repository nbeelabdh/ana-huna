<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; overflow: hidden; height: 100vh; }
        .chat-bg { background-color: #e5ddd5; background-image: url('https://www.transparenttextures.com/patterns/connect.png'); }
        .tab-active { border-bottom: 4px solid #ffffff; color: #ffffff; }
        .screen { display: none; height: 100%; overflow-y: auto; }
        .active-screen { display: block; }
    </style>
</head>
<body class="flex flex-col">

    <header class="bg-[#075E54] text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-6 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
            <i class="fas fa-search text-xl"></i>
        </div>
    </header>

    <nav class="bg-[#075E54] text-blue-100 flex justify-around font-bold z-30">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 flex-1 tab-active">الرادار</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 flex-1">دردشة</button>
    </nav>

    <main class="flex-1 relative overflow-hidden">
        <section id="section-nearby" class="screen active-screen p-4 space-y-4">
            <div id="groups-list" class="space-y-3">
                <p class="text-center text-gray-400">جاري الاتصال بالخادم...</p>
            </div>
            <button onclick="addGroup()" class="fixed bottom-20 left-6 bg-[#25d366] text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl z-50"><i class="fas fa-plus"></i></button>
        </section>

        <section id="section-chats" class="screen">
            <div onclick="openChat('المجموعة العامة')" class="flex items-center p-4 bg-white border-b cursor-pointer">
                <div class="w-14 h-14 bg-green-600 rounded-full flex items-center justify-center text-white text-2xl"><i class="fas fa-users"></i></div>
                <div class="mr-4 flex-1 text-right">
                    <h4 class="font-bold">المجموعة العامة</h4>
                    <p class="text-sm text-gray-500">دردش مع كل المستخدمين</p>
                </div>
            </div>
        </section>

        <section id="section-profile" class="screen p-6 text-center space-y-6">
            <h2 class="text-2xl font-bold text-gray-800">إعدادات الهوية</h2>
            <div class="flex flex-col items-center">
                <div class="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center mb-4 border-4 border-[#075E54]">
                    <i class="fas fa-user text-4xl text-gray-500"></i>
                </div>
                <input type="text" id="user-display-name" placeholder="ادخل اسمك هنا" class="w-full p-4 rounded-xl border-2 border-gray-100 text-center outline-none focus:border-[#075E54]">
            </div>
            <button onclick="updateName()" class="w-full bg-[#075E54] text-white p-4 rounded-xl font-bold shadow-lg hover:bg-[#128c7e] transition">تحديث الاسم</button>
        </section>
    </main>

    <div id="chat-win" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center">
            <button onclick="closeChat()" class="ml-4"><i class="fas fa-arrow-right text-xl"></i></button>
            <h4 id="chat-title" class="font-bold flex-1 text-right">المجموعة</h4>
        </header>
        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto chat-bg flex flex-col space-y-3"></div>
        <footer class="p-2 bg-white flex items-center gap-2 border-t">
            <input id="msg-input" type="text" placeholder="اكتب رسالة..." class="flex-1 p-3 bg-gray-100 rounded-2xl outline-none text-right shadow-inner">
            <button onclick="sendMessage()" class="bg-[#128c7e] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md active:scale-95 transition"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك يا نبيل
        const firebaseConfig = {
            apiKey: "AIzaSyAKQ_kWqdHyE5o7fjViCfeRtQOp1TZsg4",
            authDomain: "anahuna-bc15f.firebaseapp.com",
            projectId: "anahuna-bc15f",
            storageBucket: "anahuna-bc15f.firebasestorage.app",
            messagingSenderId: "979622896700",
            appId: "1:979622896700:web:a18a681697a7548adb4f39",
            measurementId: "G-4Z69C9C13H"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myName = localStorage.getItem('ana-huna-name') || "مستخدم مجهول";

        function showSection(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById('section-' + id).classList.add('active-screen');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id)?.classList.add('tab-active');
        }

        function updateName() {
            const n = document.getElementById('user-display-name').value;
            if(n) { myName = n; localStorage.setItem('ana-huna-name', n); alert('أهلاً بك يا ' + n); }
        }

        function sendMessage() {
            const inp = document.getElementById('msg-input');
            if(!inp.value.trim()) return;
            db.ref('global_messages').push({
                name: myName,
                msg: inp.value,
                time: Date.now()
            });
            inp.value = "";
        }

        db.ref('global_messages').limitToLast(50).on('child_added', (snap) => {
            const data = snap.val();
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            const isMe = data.name === myName;
            div.className = `p-3 rounded-2xl max-w-[85%] ${isMe ? 'bg-[#dcf8c6] self-start ml-auto shadow-sm' : 'bg-white self-end mr-auto shadow-sm'} text-right`;
            div.innerHTML = `<span class="block text-[10px] text-green-700 font-bold">${data.name}</span>${data.msg}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        function addGroup() {
            const g = prompt("اسم المجموعة القريبة الجديدة:");
            if(g) db.ref('groups').push({ name: g, owner: myName });
        }

        db.ref('groups').on('value', (snap) => {
            const list = document.getElementById('groups-list');
            list.innerHTML = "";
            snap.forEach(c => {
                const group = c.val();
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl shadow flex items-center justify-between border-r-4 border-[#25d366] mb-2";
                div.innerHTML = `<h4 class="font-bold">${group.name}</h4><button onclick="openChat('${group.name}')" class="bg-[#128c7e] text-white px-4 py-2 rounded-xl text-xs font-bold">انضمام</button>`;
                list.appendChild(div);
            });
        });

        function openChat(t) { document.getElementById('chat-win').classList.remove('hidden'); document.getElementById('chat-title').innerText = t; }
        function closeChat() { document.getElementById('chat-win').classList.add('hidden'); }
    </script>
</body>
</html>
