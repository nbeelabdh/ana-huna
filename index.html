<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna Super App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; overflow: hidden; height: 100vh; }
        .chat-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .tab-active { border-bottom: 4px solid #128c7e; color: #128c7e; }
        .screen { display: none; height: 100%; overflow-y: auto; }
        .active-screen { display: block; }
    </style>
</head>
<body class="flex flex-col">

    <header class="bg-[#075E54] text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-5 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
            <i class="fas fa-search text-xl"></i>
            <i class="fas fa-ellipsis-v text-xl"></i>
        </div>
    </header>

    <nav class="bg-white shadow flex justify-around text-gray-500 font-bold z-40">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 flex-1 tab-active">الرادار</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 flex-1">دردشة</button>
        <button onclick="showSection('status')" id="tab-status" class="py-3 flex-1">حالات</button>
        <button onclick="showSection('calls')" id="tab-calls" class="py-3 flex-1">مكالمات</button>
    </nav>

    <main class="flex-1 relative overflow-hidden">
        
        <section id="section-nearby" class="screen active-screen p-4 space-y-4">
            <div class="flex justify-between items-center bg-blue-50 p-3 rounded-xl border border-blue-200">
                <h3 class="font-bold text-blue-800">المجموعات القريبة</h3>
                <button onclick="openModal('group-modal')" class="bg-blue-600 text-white px-3 py-1 rounded-full text-xs">+ إضافة</button>
            </div>
            <div id="groups-list" class="space-y-3">
                <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between border-r-4 border-green-500">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-green-600 text-xl"><i class="fas fa-users"></i></div>
                        <div class="mr-3 text-right"><h4 class="font-bold g-name">شباب اليمن</h4><p class="text-[10px] text-gray-400">نشط الآن</p></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editGroup(this)" class="text-blue-500"><i class="fas fa-edit"></i></button>
                        <button onclick="openChat('شباب اليمن', true)" class="bg-[#128c7e] text-white px-4 py-1 rounded-lg text-xs">دخول</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-chats" class="screen divide-y divide-gray-100">
            <div onclick="openChat('المهندس نبيل')" class="flex items-center p-4 bg-white hover:bg-gray-50 cursor-pointer">
                <img src="https://ui-avatars.com/api/?name=N&background=075E54&color=fff" class="w-14 h-14 rounded-full">
                <div class="mr-4 flex-1 text-right">
                    <div class="flex justify-between font-bold"><h4>نبيل</h4><span class="text-xs text-green-500">الآن</span></div>
                    <p class="text-sm text-gray-500 truncate">هذا هو الكود الكامل يا بطل!</p>
                </div>
            </div>
        </section>

        <section id="section-status" class="screen p-4 space-y-4">
            <div class="flex items-center p-2 cursor-pointer" onclick="document.getElementById('status-input').click()">
                <div class="relative">
                    <img id="my-status-preview" src="https://ui-avatars.com/api/?name=N&background=random" class="w-16 h-16 rounded-full border-2 border-gray-300 p-1">
                    <div class="absolute bottom-0 left-0 bg-[#25d366] text-white w-6 h-6 rounded-full flex items-center justify-center border-2 border-white"><i class="fas fa-plus text-xs"></i></div>
                </div>
                <div class="mr-4 text-right"><h4 class="font-bold">حالتك</h4><p class="text-xs text-gray-400">انقر لإضافة حالة</p></div>
                <input type="file" id="status-input" class="hidden" onchange="uploadStatus(event)">
            </div>
            <div id="status-container" class="space-y-4">
                <p class="text-xs font-bold text-gray-500 border-b pb-1">تحديثات الأصدقاء</p>
            </div>
        </section>

        <section id="section-calls" class="screen p-4 space-y-4">
            <h3 class="font-bold text-gray-600">المكالمات الأخيرة</h3>
            <div id="calls-container" class="space-y-4 text-right">
                <p class="text-center text-sm text-gray-400 pt-10">لا يوجد مكالمات بعد</p>
            </div>
        </section>

        <section id="section-profile" class="screen p-6 text-center space-y-6">
            <div class="relative inline-block">
                <img id="prof-img" src="https://ui-avatars.com/api/?name=Nabeel&size=128&background=075E54&color=fff" class="w-32 h-32 rounded-full border-4 border-white shadow-xl">
                <button onclick="document.getElementById('prof-file').click()" class="absolute bottom-1 left-1 bg-green-500 text-white p-2 rounded-full shadow-lg"><i class="fas fa-camera"></i></button>
                <input type="file" id="prof-file" class="hidden" onchange="updateProfilePhoto(event)">
            </div>
            <div class="space-y-2">
                <input type="text" id="prof-name" value="نبيل" class="w-full text-center text-2xl font-bold bg-transparent border-b outline-none focus:border-green-500">
                <input type="text" id="prof-bio" value="مرحباً! أنا أستخدم أنا هنا" class="w-full text-center text-gray-500 bg-transparent outline-none">
            </div>
            <button onclick="alert('تم حفظ البيانات بنجاح!')" class="w-full bg-[#075E54] text-white p-4 rounded-xl font-bold shadow-lg">حفظ التغييرات</button>
        </section>
    </main>

    <div id="chat-win" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center shadow-lg">
            <button onclick="closeChat()" class="ml-4"><i class="fas fa-arrow-right text-xl"></i></button>
            <div class="flex-1 text-right">
                <h4 id="chat-title" class="font-bold text-lg">اسم الشخص</h4>
                <p class="text-[10px] opacity-80">نشط الآن</p>
            </div>
            <div class="flex space-x-6 space-x-reverse mr-4">
                <button onclick="triggerCall('فيديو')"><i class="fas fa-video"></i></button>
                <button onclick="triggerCall('صوتية')"><i class="fas fa-phone"></i></button>
            </div>
        </header>
        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto chat-bg flex flex-col space-y-3"></div>
        <footer class="p-2 bg-gray-100 flex items-center gap-2 border-t">
            <input id="msg-input" type="text" placeholder="اكتب رسالة..." class="flex-1 p-3 rounded-full border-none outline-none shadow-sm text-right">
            <button onclick="sendMsgNow()" class="bg-[#128c7e] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </div>

    <div id="call-screen" class="fixed inset-0 bg-[#075E54] z-[500] hidden flex flex-col items-center justify-center text-white p-10">
        <img id="call-photo" src="" class="w-32 h-32 rounded-full border-4 border-white/30 mb-6 shadow-2xl">
        <h2 id="call-user" class="text-3xl font-bold">...</h2>
        <p class="mt-4 opacity-70 animate-pulse text-xl">جاري الاتصال...</p>
        <div class="flex space-x-8 space-x-reverse absolute bottom-20">
            <button onclick="endCallNow()" class="bg-red-500 w-20 h-20 rounded-full flex items-center justify-center shadow-2xl"><i class="fas fa-phone-slash text-2xl"></i></button>
        </div>
    </div>

    <div id="group-modal" class="fixed inset-0 bg-black/60 z-[200] hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl text-right">
            <h3 id="modal-title" class="text-xl font-bold mb-6 text-gray-800 border-b pb-3">إنشاء مجموعة جديدة</h3>
            <input id="g-input" type="text" placeholder="اسم المجموعة..." class="w-full p-4 border rounded-2xl mb-6 outline-none focus:border-green-600 shadow-inner">
            <div class="flex gap-3">
                <button onclick="confirmSaveGroup()" class="flex-1 bg-[#25d366] text-white py-4 rounded-2xl font-bold shadow-lg">حفظ</button>
                <button onclick="closeModal('group-modal')" class="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        let currentTarget = "";
        let editingGroupEl = null;

        // وظيفة التنقل بين الشاشات (حل مشكلة "مشلول")
        function showSection(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById('section-' + id).classList.add('active-screen');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id)?.classList.add('tab-active');
        }

        // المجموعات
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { 
            document.getElementById(id).classList.add('hidden'); 
            editingGroupEl = null; 
            document.getElementById('g-input').value = "";
            document.getElementById('modal-title').innerText = "إنشاء مجموعة جديدة";
        }

        function confirmSaveGroup() {
            const name = document.getElementById('g-input').value;
            if(!name) return;
            if(editingGroupEl) {
                editingGroupEl.querySelector('.g-name').innerText = name;
            } else {
                const list = document.getElementById('groups-list');
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between border-r-4 border-blue-500";
                div.innerHTML = `<div class="flex items-center"><div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-xl"><i class="fas fa-users"></i></div><div class="mr-3 text-right"><h4 class="font-bold g-name">${name}</h4><p class="text-[10px] text-gray-400">أنشئت الآن</p></div></div><div class="flex gap-2"><button onclick="editGroup(this)" class="text-blue-500"><i class="fas fa-edit"></i></button><button onclick="openChat('${name}', true)" class="bg-[#128c7e] text-white px-4 py-1 rounded-lg text-xs">دخول</button></div>`;
                list.prepend(div);
            }
            closeModal('group-modal');
        }

        function editGroup(btn) {
            editingGroupEl = btn.closest('.bg-white');
            document.getElementById('g-input').value = editingGroupEl.querySelector('.g-name').innerText;
            document.getElementById('modal-title').innerText = "تعديل اسم المجموعة";
            openModal('group-modal');
        }

        // الدردشة
        function openChat(name, isGroup) {
            currentTarget = name;
            document.getElementById('chat-win').classList.remove('hidden');
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-messages').innerHTML = `<div class="self-center bg-white/60 text-[10px] px-4 py-1 rounded-full text-gray-500 shadow-sm">${isGroup ? 'مجموعة ' : ''}${name}</div>`;
        }
        function closeChat() { document.getElementById('chat-win').classList.add('hidden'); }

        function sendMsgNow() {
            const inp = document.getElementById('msg-input');
            if(!inp.value.trim()) return;
            const msg = document.createElement('div');
            msg.className = "self-start bg-[#dcf8c6] p-3 rounded-xl shadow-sm text-sm ml-auto max-w-[80%] text-right";
            msg.innerHTML = `${inp.value} <span class="block text-[8px] text-gray-400 mt-1">الآن ✓✓</span>`;
            document.getElementById('chat-messages').appendChild(msg);
            inp.value = "";
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
        }

        // الحالات
        function uploadStatus(e) {
            const file = e.target.files[0];
            if(file) {
                const url = URL.createObjectURL(file);
                document.getElementById('my-status-preview').src = url;
                const container = document.getElementById('status-container');
                const div = document.createElement('div');
                div.className = "flex items-center p-2 bg-white rounded-2xl shadow-sm";
                div.innerHTML = `<img src="${url}" class="w-14 h-14 rounded-full border-2 border-green-500 p-0.5"><div class="mr-3 text-right"><h4 class="font-bold">حالتي الجديدة</h4><p class="text-[10px] text-gray-400 text-right">منذ ثانية</p></div>`;
                container.prepend(div);
            }
        }

        // المكالمات
        function triggerCall(type) {
            document.getElementById('call-user').innerText = currentTarget;
            document.getElementById('call-photo').src = `https://ui-avatars.com/api/?name=${currentTarget}&background=random`;
            document.getElementById('call-screen').classList.remove('hidden');
            
            const logs = document.getElementById('calls-container');
            if(logs.innerText.includes('لا يوجد')) logs.innerHTML = "";
            const div = document.createElement('div');
            div.className = "flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm";
            div.innerHTML = `<div class="flex items-center"><div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-blue-500"><i class="fas fa-long-arrow-alt-left"></i></div><div class="mr-3 text-right"><h4 class="font-bold text-sm">${currentTarget}</h4><p class="text-[10px] text-gray-400">مكالمة ${type} • الآن</p></div></div><i class="fas fa-${type==='فيديو'?'video':'phone'} text-green-600 text-xl"></i>`;
            logs.prepend(div);
        }
        function endCallNow() { document.getElementById('call-screen').classList.add('hidden'); }

        // الملف الشخصي
        function updateProfilePhoto(e) {
            const file = e.target.files[0];
            if(file) document.getElementById('prof-img').src = URL.createObjectURL(file);
        }
    </script>
</body>
</html>
