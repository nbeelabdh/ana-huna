<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; }
        .tab-active { border-bottom: 3px solid #128c7e; color: #128c7e; }
        .section-content { display: none; }
        .section-content.active { display: block; }
        /* أنيميشن لظهور النوافذ */
        .modal-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-[#075E54] text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-4 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
            <button><i class="fas fa-search text-xl"></i></button>
            <button onclick="alert('القائمة')"><i class="fas fa-ellipsis-v text-xl"></i></button>
        </div>
    </header>

    <nav class="bg-white shadow flex justify-around text-gray-500 font-bold z-40">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 px-2 flex-1 tab-active">القريبين</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 px-2 flex-1">دردشة</button>
        <button onclick="showSection('status')" id="tab-status" class="py-3 px-2 flex-1">حالات</button>
        <button onclick="showSection('calls')" id="tab-calls" class="py-3 px-2 flex-1">مكالمات</button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-24">
        
        <section id="section-nearby" class="section-content active p-4 space-y-4 text-right">
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 flex justify-between items-center">
                <div>
                    <h3 class="font-bold text-blue-800">رادار أنا هنا</h3>
                    <p class="text-xs text-blue-600">اكتشف ما حولك من جروبات ومنشآت</p>
                </div>
                <i class="fas fa-street-view text-blue-500 text-2xl"></i>
            </div>
            
            <div class="bg-white p-3 rounded-xl shadow-sm flex items-center justify-between border-r-4 border-green-500">
                <div class="flex items-center">
                    <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center text-xl font-bold">ن</div>
                    <div class="mr-3">
                        <h4 class="font-bold">نبيل (أنت)</h4>
                        <p class="text-xs text-green-500">نشط الآن</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-chats" class="section-content">
            <div onclick="openChat('أحمد')" class="flex items-center p-4 bg-white border-b cursor-pointer">
                <img src="https://ui-avatars.com/api/?name=Ahmed&background=random" class="w-14 h-14 rounded-full ml-4">
                <div class="flex-1 text-right">
                    <h4 class="font-bold">أحمد</h4>
                    <p class="text-sm text-gray-500">مرحباً نبيل، هل بدأت بإنشاء الجروبات؟</p>
                </div>
            </div>
        </section>

        <section id="section-status" class="section-content p-4 text-center text-gray-400 mt-10">لا توجد حالات</section>
        <section id="section-calls" class="section-content p-4 text-center text-gray-400 mt-10">سجل المكالمات فارغ</section>
        <section id="section-profile" class="section-content p-6 text-center">
            <img id="profile-img-display" src="https://ui-avatars.com/api/?name=Nabeel&size=128" class="w-32 h-32 rounded-full border-4 border-white shadow mx-auto">
            <h2 class="text-2xl font-bold mt-4">نبيل</h2>
        </section>
    </main>

    <div class="fixed bottom-24 left-6 flex flex-col space-y-4 items-center">
        <div class="flex flex-col items-center">
            <span class="text-[10px] bg-orange-500 text-white px-2 py-0.5 rounded mb-1 shadow">منشأة</span>
            <button onclick="showCreateModal('entity')" class="bg-orange-500 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center transform active:scale-90 transition">
                <i class="fas fa-store text-xl"></i>
            </button>
        </div>
        <div class="flex flex-col items-center">
            <span class="text-[10px] bg-[#128c7e] text-white px-2 py-0.5 rounded mb-1 shadow">جروب</span>
            <button onclick="showCreateModal('group')" class="bg-[#128c7e] text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center transform active:scale-90 transition">
                <i class="fas fa-users text-xl"></i>
            </button>
        </div>
    </div>

    <div id="create-modal" class="fixed inset-0 bg-black/50 z-[200] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 modal-fade">
            <h3 id="modal-title" class="text-xl font-bold mb-4 text-[#075E54]">عنوان النافذة</h3>
            <div id="modal-content" class="space-y-4">
                </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-500 font-bold">إلغاء</button>
                <button onclick="handleConfirm()" class="px-6 py-2 bg-[#075E54] text-white rounded-xl font-bold shadow-md">تأكيد الإنشاء</button>
            </div>
        </div>
    </div>

    <div id="chat-window" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center">
            <button onclick="closeChat()" class="ml-4 text-xl"><i class="fas fa-arrow-right"></i></button>
            <h4 id="chat-name" class="font-bold">الاسم</h4>
        </header>
        <div id="chat-content" class="flex-1 p-4 overflow-y-auto chat-bg flex flex-col space-y-3"></div>
        <footer class="p-2 bg-gray-100 flex items-center gap-2 border-t">
            <input id="msg-input" type="text" placeholder="اكتب رسالة..." class="flex-1 p-2 rounded-full border bg-white text-right">
            <button onclick="processMessage()" class="bg-[#075E54] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </div>

    <script>
        let currentMode = '';

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id)?.classList.add('tab-active');
        }

        // دالة إظهار نافذة الإنشاء
        function showCreateModal(type) {
            currentMode = type;
            const modal = document.getElementById('create-modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');

            if(type === 'group') {
                title.innerText = "إنشاء مجموعة جديدة";
                content.innerHTML = `
                    <input type="text" id="input-name" placeholder="اسم الجروب (مثلاً: مطوري العرب)" class="w-full border p-3 rounded-xl text-right outline-none focus:border-green-500">
                    <p class="text-xs text-gray-400 text-right">المجموعات تساعدك على التواصل مع الأشخاص القريبين منك واهتماماتك.</p>
                `;
            } else {
                title.innerText = "إضافة منشأة جديدة";
                content.innerHTML = `
                    <input type="text" id="input-name" placeholder="اسم المنشأة (مثلاً: بقالة البركة)" class="w-full border p-3 rounded-xl text-right outline-none focus:border-orange-500">
                    <select id="input-type" class="w-full border p-3 rounded-xl text-right outline-none">
                        <option>مطعم / مقهى</option>
                        <option>محل تجاري</option>
                        <option>مكتب خدمات</option>
                        <option>أخرى</option>
                    </select>
                    <p class="text-xs text-gray-400 text-right">سيتم تسجيل موقع المنشأة في إحداثيات موقعك الحالي تلقائياً.</p>
                `;
            }
        }

        function closeModal() {
            document.getElementById('create-modal').classList.add('hidden');
        }

        function handleConfirm() {
            const name = document.getElementById('input-name').value;
            if(!name) { alert("يرجى إدخال الاسم أولاً"); return; }
            
            const message = currentMode === 'group' ? `تم إنشاء جروب "${name}" بنجاح!` : `تم إضافة منشأة "${name}" إلى الرادار!`;
            alert(message);
            closeModal();
        }

        function openChat(name) {
            document.getElementById('chat-window').classList.remove('hidden');
            document.getElementById('chat-name').innerText = name;
        }

        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }

        function processMessage() {
            const input = document.getElementById('msg-input');
            if(input.value.trim()){
                const container = document.getElementById('chat-content');
                const wrapper = document.createElement('div');
                wrapper.className = "self-start bg-[#dcf8c6] p-3 rounded-lg shadow-sm max-w-[85%] text-sm text-right";
                wrapper.innerText = input.value;
                container.appendChild(wrapper);
                input.value = "";
                container.scrollTop = container.scrollHeight;
            }
        }
    </script>
</body>
</html>
