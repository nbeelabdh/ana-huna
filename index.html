<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; }
        .tab-active { border-bottom: 3px solid #128c7e; color: #128c7e; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-[#075E54] text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-4 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
            <button><i class="fas fa-search text-xl"></i></button>
            <button onclick="alert('خيارات إضافية')">
                <i class="fas fa-ellipsis-v text-xl"></i>
            </button>
        </div>
    </header>

    <nav class="bg-white shadow flex justify-around text-gray-500 font-bold z-40">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 px-2 flex-1 tab-active"><i class="fas fa-map-marker-alt ml-2"></i>القريبين</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 px-2 flex-1"><i class="fas fa-comment ml-2"></i>دردشة</button>
        <button onclick="showSection('status')" id="tab-status" class="py-3 px-2 flex-1"><i class="fas fa-circle-notch ml-2"></i>حالات</button>
        <button onclick="showSection('calls')" id="tab-calls" class="py-3 px-2 flex-1"><i class="fas fa-phone ml-2"></i>مكالمات</button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-20">
        
        <section id="section-nearby" class="p-4 space-y-4">
            <div class="bg-blue-100 p-4 rounded-xl flex items-center justify-between">
                <div>
                    <h3 class="font-bold text-blue-800">رادار القريبين نشط</h3>
                    <p class="text-sm text-blue-600">يتم عرض الأشخاص والمنشآت في نطاق 5 كم</p>
                </div>
                <button onclick="alert('جاري تحديث الموقع...')" class="bg-blue-500 text-white p-2 rounded-full"><i class="fas fa-sync"></i></button>
            </div>

            <div class="space-y-3">
                <div class="bg-white p-3 rounded-xl shadow-sm flex items-center justify-between border-r-4 border-green-500">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center text-xl font-bold text-white">ن</div>
                        <div class="mr-3 text-right">
                            <h4 class="font-bold">نبيل (أنت)</h4>
                            <p class="text-xs text-green-500 font-bold">نشط الآن</p>
                        </div>
                    </div>
                    <span class="text-xs text-gray-400">0 كم</span>
                </div>
            </div>
        </section>

        <section id="section-chats" class="hidden">
            <div class="divide-y">
                <div onclick="openChat('أحمد')" class="flex items-center p-4 bg-white hover:bg-gray-50 cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name=Ahmed&background=random" class="w-14 h-14 rounded-full ml-4">
                    <div class="flex-1 text-right">
                        <div class="flex justify-between">
                            <h4 class="font-bold">أحمد</h4>
                            <span class="text-xs text-gray-400">10:30 ص</span>
                        </div>
                        <p class="text-sm text-gray-500 truncate">أهلاً نبيل، هل أرسلت الموقع؟</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-profile" class="hidden p-6 text-center">
            <div class="relative inline-block">
                <img id="profile-img-display" src="https://ui-avatars.com/api/?name=Nabeel&size=128" class="w-32 h-32 rounded-full border-4 border-white shadow">
                <button onclick="document.getElementById('profile-upload').click()" class="absolute bottom-0 left-0 bg-green-500 text-white p-2 rounded-full shadow-md"><i class="fas fa-camera"></i></button>
                <input type="file" id="profile-upload" class="hidden" accept="image/*" onchange="updateProfilePic(event)">
            </div>
            <h2 class="text-2xl font-bold mt-4 text-gray-800">نبيل</h2>
        </section>

    </main>

    <div id="chat-window" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center">
            <button onclick="closeChat()" class="ml-4 text-xl"><i class="fas fa-arrow-right"></i></button>
            <img id="chat-avatar" src="" class="w-10 h-10 rounded-full ml-3">
            <div class="flex-1 text-right">
                <h4 id="chat-name" class="font-bold">اسم الشخص</h4>
                <p class="text-xs opacity-75">نشط الآن</p>
            </div>
            <div class="flex space-x-4 space-x-reverse">
                <button onclick="startCall('video')"><i class="fas fa-video"></i></button>
                <button onclick="startCall('voice')"><i class="fas fa-phone"></i></button>
            </div>
        </header>

        <div id="chat-content" class="flex-1 p-4 overflow-y-auto chat-bg space-y-4 flex flex-col">
            </div>

        <footer class="p-2 bg-gray-100 flex items-center gap-2 border-t">
            <button onclick="document.getElementById('chat-img-upload').click()" class="text-gray-500 text-xl px-1"><i class="fas fa-paperclip"></i></button>
            <input type="file" id="chat-img-upload" class="hidden" accept="image/*" onchange="sendChatImage(event)">
            
            <input id="msg-input" type="text" placeholder="اكتب رسالة..." class="flex-1 p-2 rounded-full border focus:outline-none bg-white">
            
            <button onclick="sendMyLocation()" class="text-red-500 text-xl px-1"><i class="fas fa-map-marker-alt"></i></button>
            <button onmousedown="startVoiceRec()" onmouseup="stopVoiceRec()" class="text-green-600 text-xl px-1"><i class="fas fa-microphone"></i></button>
            <button onclick="processMessage()" class="bg-[#075E54] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
                <i class="fas fa-paper-plane"></i>
            </button>
        </footer>
    </div>

    <div id="call-screen" class="fixed inset-0 bg-[#075E54] z-[300] hidden flex flex-col items-center justify-center text-white">
        <img id="call-avatar" src="" class="w-32 h-32 rounded-full border-4 border-white/20 mb-6">
        <h2 id="call-name" class="text-3xl font-bold">المتصل</h2>
        <p class="animate-pulse mt-4">جاري الاتصال...</p>
        <button onclick="endCall()" class="mt-20 bg-red-500 p-6 rounded-full shadow-2xl"><i class="fas fa-phone-slash text-3xl"></i></button>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id)?.classList.add('tab-active');
        }

        function openChat(name) {
            document.getElementById('chat-name').innerText = name;
            document.getElementById('chat-avatar').src = "https://ui-avatars.com/api/?name=" + name + "&background=random";
            document.getElementById('chat-window').classList.remove('hidden');
        }

        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }

        function addToChat(content, type = 'text') {
            const container = document.getElementById('chat-content');
            const wrapper = document.createElement('div');
            wrapper.className = "self-start bg-[#dcf8c6] p-3 rounded-lg shadow-sm max-w-[85%] text-sm text-right mb-2";
            
            if(type === 'text') wrapper.innerText = content;
            else wrapper.innerHTML = content;
            
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function processMessage() {
            const input = document.getElementById('msg-input');
            if(input.value.trim()){ addToChat(input.value); input.value = ""; }
        }

        function sendChatImage(e) {
            const reader = new FileReader();
            reader.onload = () => addToChat(`<img src="${reader.result}" class="rounded-lg max-h-60">`, 'html');
            reader.readAsDataURL(e.target.files[0]);
        }

        function sendMyLocation() {
            if(navigator.geolocation) {
                addToChat("📍 جاري إرسال الموقع...");
                navigator.geolocation.getCurrentPosition(p => {
                    const link = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                    addToChat(`<a href="${link}" target="_blank" class="text-blue-600 font-bold underline">فتح الموقع على الخريطة 🗺️</a>`, 'html');
                });
            }
        }

        function startVoiceRec() { document.getElementById('msg-input').placeholder = "تسجيل صوتي... 🔴"; }
        function stopVoiceRec() { 
            document.getElementById('msg-input').placeholder = "اكتب رسالة..."; 
            addToChat("🎤 رسالة صوتية");
        }

        function updateProfilePic(e) {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('profile-img-display').src = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        }

        function startCall(type) {
            document.getElementById('call-name').innerText = document.getElementById('chat-name').innerText;
            document.getElementById('call-avatar').src = document.getElementById('chat-avatar').src;
            document.getElementById('call-screen').classList.remove('hidden');
        }
        function endCall() { document.getElementById('call-screen').classList.add('hidden'); }
    </script>
</body>
</html>
