<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; overflow: hidden; }
        
        /* التحديث الجديد: خلفية دردشة هندسية ناعمة وجذابة */
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; opacity: 0.1; }
        .chat-container { background-color: white; position: relative; }
        .chat-container::before { content: ""; position: absolute; inset: 0; background-image: url('https://www.transparenttextures.com/patterns/az-subtle.png'); opacity: 0.3; }

        /* تفعيل ميزة النقر المطول */
        .msg-bubble { position: relative; cursor: pointer; transition: transform 0.1s ease-out; }
        .msg-bubble:active { transform: scale(0.97); }

        /* أنيميشن للمودال */
        .modal-fade { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-[#1E3A8A] text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-4 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
            <button><i class="fas fa-search text-xl"></i></button>
            <button onclick="alert('خيارات إضافية')"><i class="fas fa-ellipsis-v text-xl"></i></button>
        </div>
    </header>

    <nav class="bg-white shadow flex justify-around text-gray-500 font-bold z-40 border-b">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 px-2 flex-1 tab-active text-[#1E3A8A] border-b-2 border-[#1E3A8A]">القريبين</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 px-2 flex-1">دردشة</button>
        <button onclick="showSection('status')" id="tab-status" class="py-3 px-2 flex-1">حالات</button>
        <button onclick="showSection('calls')" id="tab-calls" class="py-3 px-2 flex-1">مكالمات</button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-20">
        
        <section id="section-nearby" class="section-content active p-4 space-y-4">
            <div class="bg-blue-100 p-4 rounded-xl flex items-center justify-between border-r-4 border-[#1E3A8A] mb-3 text-right shadow-sm">
                <div>
                    <h3 class="font-bold text-blue-900">رادار أنا هنا نشط</h3>
                    <p class="text-sm">اكتشف من حولك الآن</p>
                </div>
                <button onclick="alert('جاري تحديث الموقع...')" class="bg-blue-600 text-white p-2 rounded-full"><i class="fas fa-sync"></i></button>
            </div>
            
            <div class="space-y-3">
                <div class="bg-white p-3 rounded-xl shadow-sm flex items-center justify-between border-r-4 border-blue-500">
                    <div class="flex items-center">
                        <img id="nearby-pic" src="https://ui-avatars.com/api/?name=Nabeel" class="w-12 h-12 rounded-full border border-blue-100">
                        <div class="mr-3 text-right">
                            <h4 class="font-bold">نبيل (أنت)</h4>
                            <p class="text-xs text-blue-500 font-bold">نشط الآن • 0 كم</p>
                        </div>
                    </div>
                    <button onclick="openChat('أحمد')" class="bg-blue-100 text-[#1E3A8A] p-3 rounded-full"><i class="fas fa-comment"></i></button>
                </div>
            </div>
        </section>

        <section id="section-chats" class="section-content hidden">
            <div class="divide-y divide-gray-100">
                <div onclick="openChat('أحمد')" class="flex items-center p-4 bg-white hover:bg-gray-50 cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name=Ahmed&background=random" class="w-14 h-14 rounded-full ml-4 shadow-sm border border-gray-100">
                    <div class="flex-1 text-right">
                        <div class="flex justify-between">
                            <h4 class="font-bold">أحمد</h4>
                            <span class="text-xs text-gray-400">10:30 ص</span>
                        </div>
                        <p class="text-sm text-gray-500 text-right truncate">أهلاً نبيل، الخلفية الجديدة رائعة!</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-status" class="section-content hidden p-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm text-center">
                <i class="fas fa-circle-notch text-5xl text-gray-300 mb-3"></i>
                <h3 class="font-bold text-gray-700">لا توجد حالات جديدة</h3>
                <p class="text-sm text-gray-500 mt-2">انقر على الزر لإضافة حالة جديدة</p>
            </div>
        </section>

        <section id="section-profile" class="section-content hidden p-6 text-center">
            <div class="relative inline-block">
                <img id="profile-pic-main" src="https://ui-avatars.com/api/?name=Nabeel&size=128" class="w-32 h-32 rounded-full border-4 border-white shadow-xl mx-auto object-cover">
                <button onclick="document.getElementById('upload-pic').click()" class="absolute bottom-0 left-0 bg-[#1E3A8A] text-white p-3 rounded-full shadow-lg border-2 border-white"><i class="fas fa-camera"></i></button>
                <input type="file" id="upload-pic" class="hidden" accept="image/*" onchange="syncProfilePic(event)">
            </div>
            <h2 class="text-2xl font-bold mt-4 text-[#1E3A8A]">نبيل</h2>
        </section>

    </main>

    <div class="fixed bottom-24 left-6 flex flex-col space-y-3">
        <button onclick="openCreateModal('group')" class="bg-blue-800 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center"><i class="fas fa-users text-xl"></i></button>
        <button onclick="showStatusOptions()" class="bg-blue-600 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center transform active:scale-90 transition"><i class="fas fa-plus"></i></button>
    </div>

    <div id="chat-window" class="fixed inset-0 bg-white z-[100] hidden flex flex-col chat-container">
        <header class="bg-[#1E3A8A] text-white p-4 flex items-center shadow-md relative z-10">
            <button onclick="closeChat()" class="ml-4 text-xl"><i class="fas fa-arrow-right"></i></button>
            <h4 id="chat-name" class="font-bold flex-1 text-right">الاسم</h4>
        </header>
        <div id="chat-box" class="flex-1 p-4 overflow-y-auto flex flex-col space-y-4 relative z-0">
            </div>
        <footer class="p-2 bg-gray-100 flex items-center gap-2 border-t relative z-10">
            <input id="chat-input" type="text" placeholder="اكتب رسالة..." class="flex-1 p-2 rounded-full border bg-white text-right outline-none">
            <button onclick="sendTxt()" class="bg-[#1E3A8A] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </div>

    <div id="app-modal" class="fixed inset-0 bg-black/60 z-[200] hidden flex items-center justify-center p-6 modal-fade backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-xs p-6 shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold mb-4 text-[#1E3A8A] text-right">عنوان</h3>
            <div id="modal-body" class="mb-6 space-y-3"></div>
            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-500 font-bold">إلغاء</button>
                <button id="modal-confirm" class="hidden px-6 py-2 bg-[#1E3A8A] text-white rounded-xl font-bold">تأكيد</button>
            </div>
        </div>
    </div>

    <script>
        let myImgPic = "https://ui-avatars.com/api/?name=Nabeel";
        let msgIdCounter = 0;

        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id)?.classList.add('tab-active');

            // تحديث اللون الأزرق في التاب النشط
            document.getElementById('tab-' + id).style.color = '#1E3A8A';
            document.getElementById('tab-' + id).style.borderBottomColor = '#1E3A8A';
        }

        // الدردشة والمسح لدى الطرفين
        function openChat(name) {
            document.getElementById('chat-window').classList.remove('hidden');
            document.getElementById('chat-name').innerText = name;
        }
        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }

        function sendTxt() {
            const inp = document.getElementById('chat-input');
            if(inp.value.trim()){
                msgIdCounter++;
                const container = document.getElementById('chat-box');
                const wrapper = document.createElement('div');
                const msgId = "msg-" + msgIdCounter;
                wrapper.id = msgId;
                wrapper.className = "self-start bg-blue-50 p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[85%] text-right msg-bubble modal-fade border border-blue-100";
                wrapper.innerText = inp.value;
                
                // إضافة النقر المطول للمسح
                let pressTimer;
                wrapper.onmousedown = () => pressTimer = setTimeout(() => showDeleteOptions(msgId), 500);
                wrapper.onmouseup = () => clearTimeout(pressTimer);
                wrapper.onmouseleave = () => clearTimeout(pressTimer);

                container.appendChild(wrapper);
                inp.value = "";
                container.scrollTop = container.scrollHeight;
            }
        }

        function showDeleteOptions(id) {
            const modal = document.getElementById('app-modal');
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "إدارة الرسالة";
            modal.classList.remove('hidden');
            body.innerHTML = `
                <button onclick="deleteMsg('${id}', 'all')" class="w-full bg-red-50 p-4 rounded-xl text-right text-red-700 font-bold border border-red-100 flex justify-between items-center"><i class="fas fa-trash-alt"></i> الحذف لدى الجميع (Delete for everyone)</button>
                <button onclick="deleteMsg('${id}', 'me')" class="w-full bg-gray-50 p-4 rounded-xl text-right text-gray-600 font-bold flex justify-between items-center"><i class="fas fa-trash"></i> الحذف لدي فقط</button>
            `;
        }

        function deleteMsg(id, type) {
            const msgBubble = document.getElementById(id);
            if(type === 'all') {
                msgBubble.innerHTML = `<p class="text-xs italic text-gray-400">🚫 تم حذف هذه الرسالة لدى الجميع (Delete for everyone)</p>`;
                msgBubble.style.backgroundColor = "#f9f9f9";
                msgBubble.style.borderColor = "#eaeaea";
                msgBubble.onmousedown = null; // تعطيل النقر المطول
            } else {
                msgBubble.remove();
            }
            closeModal();
        }

        // إضافة حالة جديدة
        function showStatusOptions() {
            const modal = document.getElementById('app-modal');
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "إضافة حالة جديدة";
            modal.classList.remove('hidden');
            body.innerHTML = `
                <button onclick="addStatus('image')" class="w-full bg-blue-50 p-4 rounded-xl text-right text-blue-700 font-bold flex justify-between items-center border border-blue-100"><i class="fas fa-camera"></i> إضافة حالة صورة</button>
                <button onclick="addStatus('text')" class="w-full bg-gray-50 p-4 rounded-xl text-right text-gray-600 font-bold flex justify-between items-center"><i class="fas fa-font"></i> إضافة حالة نصية</button>
            `;
        }

        function addStatus(type) {
            closeModal();
            if(type === 'image') {
                const url = prompt("أدخل رابط الصورة للحالة (تجريبي):", "https://i.pravatar.cc/300");
                if(url) alert("تمت إضافة حالة الصورة بنجاح!");
            } else {
                const text = prompt("اكتب الحالة النصية الخاصة بك:");
                if(text) alert(`تم نشر حالتك: "${text}"`);
            }
        }

        // الملف الشخصي
        function syncProfilePic(e) {
            const reader = new FileReader();
            reader.onload = () => {
                myImgPic = reader.result;
                document.getElementById('profile-pic-main').src = myImgPic;
                document.getElementById('nearby-pic').src = myImgPic;
                alert("تم تحديث صورة الملف الشخصي بنجاح!");
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function openCreateModal(type) { alert(`جاري إنشاء ${type === 'group' ? 'مجموعة' : 'منشأة'} جديدة..`); }
        function closeModal() { document.getElementById('app-modal').classList.add('hidden'); }
    </script>
</body>
</html>
