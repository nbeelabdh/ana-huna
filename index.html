<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna Super App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .chat-container { height: calc(100vh - 160px); overflow-y: auto; }
        .message-bubble { max-width: 80%; margin-bottom: 10px; padding: 10px; border-radius: 15px; position: relative; }
        .my-message { background-color: #e0f2f1; align-self: flex-start; }
        .other-message { background-color: white; align-self: flex-end; border: 1px solid #ddd; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <header class="bg-[#00695C] text-white p-4 flex justify-between items-center shadow-md">
        <button class="text-xl">✕</button>
        <h1 class="text-lg font-bold">تطبيق أنا هنا - Ana Huna</h1>
        <button class="text-xl">⋮</button>
    </header>

    <div class="bg-white p-2 flex gap-4 overflow-x-auto border-b">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-white font-bold">ن</div>
            <span class="text-xs mt-1">نبيل</span>
        </div>
        </div>

    <div id="chatMessages" class="chat-container p-4 flex flex-col gap-2">
        <div class="text-center text-gray-400 text-sm my-4">جاري تحميل الرسائل...</div>
    </div>

    <footer class="bg-white p-3 border-t">
        <div class="flex items-center gap-2 mb-3">
            <input id="messageInput" type="text" placeholder="اكتب رسالتك يا نبيل..." 
                   class="flex-1 border rounded-full px-4 py-2 outline-none focus:border-teal-600">
            <button id="sendBtn" class="bg-[#00695C] text-white w-10 h-10 rounded-full flex items-center justify-center">
                ➤
            </button>
        </div>
        
        <div class="flex justify-around text-2xl text-gray-600">
            <button title="ملاحظة">📝</button>
            <button title="تسجيل">🎤</button>
            <button title="أشخاص">👥</button>
            <button title="موقع" class="text-red-500">📍</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ضع بياناتك هنا يا نبيل لتفعيل الربط
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "ana-huna.firebaseapp.com",
            projectId: "ana-huna",
            storageBucket: "ana-huna.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messagesCol = collection(db, "messages");

        // استلام الرسائل فوراً
        const q = query(messagesCol, orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                const isMe = data.sender === "نبيل";
                chatDiv.innerHTML += `
                    <div class="message-bubble ${isMe ? 'my-message' : 'other-message'}">
                        <div class="text-[10px] text-teal-700 font-bold">${data.sender || 'مستخدم'}</div>
                        <div>${data.text}</div>
                    </div>
                `;
            });
            chatDiv.scrollTop = chatDiv.scrollHeight;
        });

        // إرسال الرسالة
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            if (input.value.trim() === "") return;

            await addDoc(messagesCol, {
                text: input.value,
                sender: "نبيل",
                createdAt: serverTimestamp()
            });
            input.value = "";
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
