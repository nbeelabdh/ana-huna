<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .tab-active { border-bottom: 3px solid #128c7e; color: #128c7e; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .msg-bubble { position: relative; cursor: pointer; transition: 0.2s; }
        .msg-bubble:active { transform: scale(0.95); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-[#075E54] text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-4 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
            <button><i class="fas fa-search text-xl"></i></button>
            <button class="relative">
                <i class="fas fa-ellipsis-v text-xl"></i>
            </button>
        </div>
    </header>

    <nav class="bg-white shadow flex justify-around text-gray-500 font-bold z-40">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 px-2 flex-1 tab-active"><i class="fas fa-map-marker-alt ml-2"></i>القريبين</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 px-2 flex-1"><i class="fas fa-comment ml-2"></i>دردشة</button>
        <button onclick="showSection('status')" id="tab-status" class="py-3 px-2 flex-1"><i class="fas fa-circle-notch ml-2"></i>حالات</button>
        <button onclick="showSection('calls')" id="tab-calls" class="py-3 px-2 flex-1"><i class="fas fa-phone ml-2"></i>مكالمات</button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-20">
        
        <section id="section-nearby" class="p-4 space-y-4">
            <div class="bg-blue-100 p-4 rounded-xl flex items-center justify-between">
                <div>
                    <h3 class="font-bold text-blue-800">رادار القريبين نشط</h3>
                    <p class="text-sm text-blue-600">يتم عرض الأشخاص والمنشآت في نطاق 5 كم</p>
                </div>
                <button onclick="alert('جاري تحديث الموقع...')" class="bg-blue-500 text-white p-2 rounded-full"><i class="fas fa-sync"></i></button>
            </div>

            <div class="space-y-3">
                <div class="bg-white p-3 rounded-xl shadow-sm flex items-center justify-between border-r-4 border-green-500">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-[#128c7e] rounded-full flex items-center justify-center text-xl font-bold text-white">ن</div>
                        <div class="mr-3 text-right">
                            <h4 class="font-bold">نبيل (أنت)</h4>
                            <p class="text-xs text-green-500 font-bold">نشط الآن</p>
                        </div>
                    </div>
                    <button onclick="openChat('نبيل')" class="bg-green-100 text-[#075E54] p-3 rounded-full shadow-sm">
                        <i class="fas fa-comment-dots text-xl"></i>
                    </button>
                </div>
            </div>
        </section>

        <section id="section-chats" class="hidden">
            <div class="divide-y">
                <div onclick="openChat('أحمد')" class="flex items-center p-4 bg-white hover:bg-gray-50 cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name=Ahmed&background=random" class="w-14 h-14 rounded-full">
                    <div class="mr-4 flex-1">
                        <div class="flex justify-between">
                            <h4 class="font-bold text-right">أحمد</h4>
                            <span class="text-xs text-gray-400">10:30 ص</span>
                        </div>
                        <p class="text-sm text-gray-500 truncate text-right">اضغط لبدء الدردشة وميزة الحذف</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-status" class="hidden p-6 text-center">
            <div id="status-display" class="bg-white p-8 rounded-2xl shadow-sm border-dashed border-2 border-gray-200">
                <i class="fas fa-circle-notch text-5xl text-gray-300 mb-4 animate-spin-slow"></i>
                <h3 class="font-bold text-gray-600">لا توجد حالات حالياً</h3>
                <p class="text-sm text-gray-400 mt-2">شارك لحظاتك مع القريبين منك</p>
            </div>
            <button onclick="showStatusMenu()" class="fixed bottom-24 left-6 bg-orange-500 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center animate-bounce">
                <i class="fas fa-plus text-xl"></i>
            </button>
        </section>

        <section id="section-profile" class="hidden p-6 text-center text-right">
            <div class="relative inline-block mb-4">
                <img src="https://ui-avatars.com/api/?name=Nabeel&size=128" class="w-32 h-32 rounded-full border-4 border-white shadow">
                <button class="absolute bottom-0 left-0 bg-green-500 text-white p-2 rounded-full"><i class="fas fa-camera"></i></button>
            </div>
            <h2 class="text-2xl font-bold">نبيل</h2>
            <p class="text-gray-500 mt-2">مرحباً! أنا أستخدم "أنا هنا"</p>
        </section>

    </main>

    <div id="chat-window" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center">
            <button onclick="closeChat()" class="ml-4 text-xl"><i class="fas fa-arrow-right"></i></button>
            <img id="chat-avatar" src="" class="w-10 h-10 rounded-full ml-3">
            <div class="flex-1 text-right">
                <h4 id="chat-name" class="font-bold">اسم الشخص</h4>
                <p class="text-xs opacity-75">نشط الآن</p>
            </div>
            <div class="flex space-x-4 space-x-reverse mr-4">
                <button onclick="startCall('video')"><i class="fas fa-video"></i></button>
                <button onclick="startCall('voice')"><i class="fas fa-phone"></i></button>
            </div>
        </header>
        <div id="chat-content" class="flex-1 p-4 overflow-y-auto chat-bg space-y-4 flex flex-col">
            </div>
        <footer class="p-2 bg-gray-100 flex items-center space-x-2 space-x-reverse">
            <input id="msg-input" type="text" placeholder="اكتب رسالة..." class="flex-1 p-3 rounded-full border focus:outline-none text-right">
            <button onclick="sendMessage()" class="bg-[#075E54] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/60 z-[200] hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold text-center border-b pb-3 text-[#075E54]">خيارات</h3>
            <div id="modal-body" class="flex flex-col gap-3"></div>
            <button onclick="closeModal()" class="w-full text-center py-2 text-gray-400 font-bold">إلغاء</button>
        </div>
    </div>

    <script>
        let msgIdCounter = 0;

        function showSection(id) {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + id)?.classList.add('tab-active');
        }

        function openChat(name) {
            document.getElementById('chat-name').innerText = name;
            document.getElementById('chat-avatar').src = "https://ui-avatars.com/api/?name=" + name + "&background=random";
            document.getElementById('chat-window').classList.remove('hidden');
        }

        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }

        // إرسال رسالة مع ميزة المسح
        function sendMessage() {
            const input = document.getElementById('msg-input');
            if(input.value.trim()){
                msgIdCounter++;
                const id = "msg-" + msgIdCounter;
                const area = document.getElementById('chat-content');
                const bubble = document.createElement('div');
                bubble.id = id;
                bubble.onclick = () => showDeleteMenu(id);
                bubble.className = "self-start bg-[#dcf8c6] p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[85%] text-right msg-bubble ml-auto";
                bubble.innerHTML = `<p class="text-sm">${input.value}</p><span class="block text-[9px] text-gray-400 mt-1">الآن</span>`;
                area.appendChild(bubble);
                input.value = "";
                area.scrollTop = area.scrollHeight;
            }
        }

        function showDeleteMenu(id) {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "إدارة الرسالة";
            modal.classList.remove('hidden');
            body.innerHTML = `
                <button onclick="deleteMsg('${id}', 'all')" class="bg-red-50 text-red-600 p-4 rounded-xl font-bold text-right flex justify-between items-center"><i class="fas fa-trash-alt"></i> الحذف لدى الجميع</button>
                <button onclick="deleteMsg('${id}', 'me')" class="bg-gray-50 text-gray-700 p-4 rounded-xl font-bold text-right flex justify-between items-center"><i class="fas fa-trash"></i> الحذف لدي فقط</button>
            `;
        }

        function deleteMsg(id, type) {
            const bubble = document.getElementById(id);
            if(type === 'all') {
                bubble.innerHTML = `<p class="text-[10px] italic text-gray-400">🚫 تم حذف هذه الرسالة لدى الجميع</p>`;
                bubble.style.backgroundColor = "#f0f0f0";
                bubble.onclick = null;
            } else { bubble.remove(); }
            closeModal();
        }

        function showStatusMenu() {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "إضافة حالة";
            modal.classList.remove('hidden');
            body.innerHTML = `
                <button onclick="alert('اختر صورة من الاستوديو')" class="bg-orange-50 text-orange-700 p-4 rounded-xl font-bold text-right flex justify-between items-center"><i class="fas fa-image"></i> إضافة حالة صورة</button>
                <button onclick="addTextStatus()" class="bg-blue-50 text-blue-700 p-4 rounded-xl font-bold text-right flex justify-between items-center"><i class="fas fa-font"></i> إضافة حالة نصية</button>
            `;
        }

        function addTextStatus() {
            const text = prompt("اكتب حالتك الآن:");
            if(text) {
                document.getElementById('status-display').innerHTML = `
                    <div class="bg-orange-100 p-6 rounded-2xl text-orange-800 font-bold text-lg">${text}</div>
                    <p class="mt-4 text-xs text-gray-400 font-bold">حالتك منشورة الآن للقريبين</p>
                `;
            }
            closeModal();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function startCall(t) { alert(`جاري بدء اتصال ${t === 'video' ? 'فيديو' : 'صوتي'} مشفر...`); }
    </script>
</body>
</html>
