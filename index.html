<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أنا هنا - النسخة المستقرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; touch-action: manipulation; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }
        .tab-active { border-bottom: 4px solid #128c7e; color: #128c7e; }
        section { display: none; height: calc(100vh - 130px); overflow-y: auto; }
        section.active { display: block; }
        .msg { max-width: 80%; padding: 10px; border-radius: 15px; margin-bottom: 10px; position: relative; }
        .msg-out { background-color: #dcf8c6; align-self: flex-end; border-top-left-radius: 0; }
        .msg-in { background-color: white; align-self: flex-start; border-top-right-radius: 0; }
        .call-overlay { display: none; position: fixed; inset: 0; background: linear-gradient(to bottom, #075E54, #128c7e); z-index: 500; flex-direction: column; align-items: center; justify-content: space-around; color: white; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-[#075E54] text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex gap-4">
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v" onclick="showSection('profile')"></i>
        </div>
    </header>

    <!-- Tabs -->
    <nav class="bg-white flex shadow-sm">
        <button onclick="switchTab('nearby')" id="btn-nearby" class="flex-1 py-3 font-bold tab-active">القريبين</button>
        <button onclick="switchTab('chats')" id="btn-chats" class="flex-1 py-3 font-bold text-gray-500">دردشة</button>
        <button onclick="switchTab('groups')" id="btn-groups" class="flex-1 py-3 font-bold text-gray-500">مجموعات</button>
        <button onclick="switchTab('calls')" id="btn-calls" class="flex-1 py-3 font-bold text-gray-500">مكالمات</button>
    </nav>

    <!-- Content Sections -->
    <main class="flex-1">
        <!-- Nearby -->
        <section id="sec-nearby" class="active p-4">
            <div class="bg-blue-50 p-4 rounded-2xl mb-4 flex justify-between items-center">
                <span class="text-blue-700 font-bold">البحث عن أشخاص قريبين...</span>
                <i class="fas fa-sync-alt animate-spin text-blue-500"></i>
            </div>
            <div onclick="openChat('أحمد')" class="bg-white p-4 rounded-xl shadow-sm flex items-center mb-3">
                <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">أ</div>
                <div class="mr-3 flex-1">
                    <h4 class="font-bold">أحمد</h4>
                    <p class="text-xs text-gray-400">يبعد 500 متر</p>
                </div>
                <i class="fas fa-comment text-[#128c7e]"></i>
            </div>
        </section>

        <!-- Chats -->
        <section id="sec-chats">
            <div onclick="openChat('أحمد')" class="flex items-center p-4 bg-white border-b hover:bg-gray-50">
                <div class="w-14 h-14 bg-blue-500 rounded-full flex items-center justify-center text-white text-xl">أ</div>
                <div class="mr-4 flex-1">
                    <div class="flex justify-between">
                        <h4 class="font-bold">أحمد</h4>
                        <span class="text-xs text-gray-400">١٠:٠٠ ص</span>
                    </div>
                    <p class="text-sm text-gray-500">كيف حالك يا نبيل؟</p>
                </div>
            </div>
        </section>

        <!-- Groups -->
        <section id="sec-groups" class="p-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg">مجموعاتك</h3>
                <button onclick="toggleModal('group-modal', true)" class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-plus ml-1"></i>جديد</button>
            </div>
            <div id="groups-container" class="space-y-3">
                <div class="p-10 text-center text-gray-400">لا توجد مجموعات حالياً</div>
            </div>
        </section>

        <!-- Calls -->
        <section id="sec-calls" class="p-4">
            <div id="calls-container" class="space-y-4">
                <div class="p-10 text-center text-gray-400 italic">سجل المكالمات فارغ</div>
            </div>
        </section>

        <!-- Profile -->
        <section id="sec-profile" class="p-6 text-center">
            <div class="relative w-32 h-32 mx-auto mb-4">
                <img id="profile-img" src="https://ui-avatars.com/api/?name=Nabeel" class="rounded-full border-4 border-white shadow-lg w-full h-full object-cover">
                <button onclick="document.getElementById('file-input').click()" class="absolute bottom-0 left-0 bg-[#128c7e] text-white p-2 rounded-full"><i class="fas fa-camera"></i></button>
            </div>
            <h2 class="text-xl font-bold">نبيل</h2>
            <p class="text-gray-500">مرحباً بك في تطبيق أنا هنا</p>
        </section>
    </main>

    <!-- Chat View Overlay -->
    <div id="chat-overlay" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center">
            <i class="fas fa-arrow-right ml-4" onclick="closeChat()"></i>
            <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center mr-2"><i class="fas fa-user"></i></div>
            <div class="flex-1">
                <h4 id="chat-title" class="font-bold">اسم الدردشة</h4>
                <span class="text-[10px] opacity-70">متصل الآن</span>
            </div>
            <div class="flex gap-5">
                <i class="fas fa-phone" onclick="startCall('صوتية')"></i>
                <i class="fas fa-video" onclick="startCall('فيديو')"></i>
            </div>
        </header>
        <div id="chat-messages" class="flex-1 chat-bg p-4 overflow-y-auto flex flex-col"></div>
        <footer class="p-2 bg-gray-50 flex items-center border-t gap-2">
            <i class="fas fa-paperclip text-gray-500 text-xl px-2" onclick="document.getElementById('file-input').click()"></i>
            <input type="text" id="chat-input" placeholder="اكتب رسالة..." class="flex-1 p-2 rounded-full border border-gray-300 focus:outline-none px-4">
            <button onclick="sendMsg()" class="bg-[#128c7e] text-white w-10 h-10 rounded-full flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </div>

    <!-- Call Screen Overlay -->
    <div id="call-screen" class="call-overlay">
        <div class="text-center">
            <div class="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
                <i class="fas fa-user text-5xl"></i>
            </div>
            <h2 id="caller-name" class="text-2xl font-bold">...</h2>
            <p id="call-status" class="mt-2">جاري الاتصال...</p>
        </div>
        <button onclick="endCall()" class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center shadow-xl">
            <i class="fas fa-phone-slash text-2xl text-white"></i>
        </button>
    </div>

    <!-- Group Modal -->
    <div id="group-modal" class="fixed inset-0 bg-black/50 z-[200] hidden flex items-center justify-center p-6">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm">
            <h3 class="text-xl font-bold mb-4">إنشاء مجموعة</h3>
            <input type="text" id="group-name-input" placeholder="اسم المجموعة" class="w-full border p-3 rounded-xl mb-4 text-right">
            <div class="flex justify-end gap-2">
                <button onclick="toggleModal('group-modal', false)" class="px-4 py-2 text-gray-400">إلغاء</button>
                <button onclick="createNewGroup()" class="px-6 py-2 bg-orange-500 text-white rounded-xl">إنشاء</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" class="hidden" onchange="handleFile(this.files[0])">

    <script>
        // --- Navigation ---
        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + tab).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.className = "flex-1 py-3 font-bold text-gray-500");
            document.getElementById('btn-' + tab).className = "flex-1 py-3 font-bold tab-active";
        }

        // --- Chat System ---
        function openChat(name) {
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-overlay').classList.remove('hidden');
            document.getElementById('chat-messages').innerHTML = "";
        }

        function closeChat() {
            document.getElementById('chat-overlay').classList.add('hidden');
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;
            
            const msgHtml = `<div class="msg msg-out shadow-sm self-end">${text}</div>`;
            document.getElementById('chat-messages').insertAdjacentHTML('beforeend', msgHtml);
            input.value = "";
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
        }

        // --- File System (Images/Videos) ---
        function handleFile(file) {
            if(!file) return;
            const chatBox = document.getElementById('chat-messages');
            const isChatOpen = !document.getElementById('chat-overlay').classList.contains('hidden');
            
            if(isChatOpen) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    let mediaHtml = "";
                    if(file.type.includes('image')) {
                        mediaHtml = `<div class="msg msg-out p-1"><img src="${e.target.result}" class="rounded-lg max-h-60 w-full object-cover"></div>`;
                    } else {
                        mediaHtml = `<div class="msg msg-out bg-gray-200 flex items-center gap-2">🎥 فيديو: ${file.name}</div>`;
                    }
                    chatBox.insertAdjacentHTML('beforeend', mediaHtml);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
                reader.readAsDataURL(file);
            } else {
                // تحديث صورة البروفايل
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('profile-img').src = e.target.result;
                reader.readAsDataURL(file);
                alert("تم تحديث الصورة الشخصية");
            }
        }

        // --- Group System ---
        function toggleModal(id, show) {
            document.getElementById(id).classList.toggle('hidden', !show);
        }

        function createNewGroup() {
            const name = document.getElementById('group-name-input').value.trim();
            if(!name) return;
            
            const container = document.getElementById('groups-container');
            if(container.innerText.includes("لا توجد")) container.innerHTML = "";
            
            const groupHtml = `
                <div onclick="openChat('${name}')" class="bg-white p-4 rounded-xl shadow-sm flex items-center border-r-4 border-orange-500">
                    <div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center font-bold">G</div>
                    <div class="mr-3 flex-1 text-right">
                        <h4 class="font-bold">${name}</h4>
                        <p class="text-xs text-gray-400">مجموعة جديدة</p>
                    </div>
                </div>`;
            container.insertAdjacentHTML('afterbegin', groupHtml);
            toggleModal('group-modal', false);
            document.getElementById('group-name-input').value = "";
        }

        // --- Call System ---
        let callTimer = null;
        function startCall(type) {
            const name = document.getElementById('chat-title').innerText;
            document.getElementById('caller-name').innerText = name;
            document.getElementById('call-status').innerText = `جاري الاتصال (${type})...`;
            document.getElementById('call-screen').style.display = 'flex';
            
            let sec = 0;
            setTimeout(() => {
                document.getElementById('call-status').innerText = "00:00";
                callTimer = setInterval(() => {
                    sec++;
                    let m = Math.floor(sec/60).toString().padStart(2,'0');
                    let s = (sec%60).toString().padStart(2,'0');
                    document.getElementById('call-status').innerText = `${m}:${s}`;
                }, 1000);
            }, 2000);
        }

        function endCall() {
            clearInterval(callTimer);
            document.getElementById('call-screen').style.display = 'none';
            
            // إضافة للسجل
            const name = document.getElementById('caller-name').innerText;
            const container = document.getElementById('calls-container');
            if(container.innerText.includes("فارغ")) container.innerHTML = "";
            
            const callLog = `
                <div class="flex items-center p-3 bg-white rounded-xl shadow-sm">
                    <i class="fas fa-phone-alt text-green-600 ml-3"></i>
                    <div class="flex-1 text-right">
                        <h4 class="font-bold">${name}</h4>
                        <p class="text-[10px] text-gray-400">مكالمة صادرة - الآن</p>
                    </div>
                </div>`;
            container.insertAdjacentHTML('afterbegin', callLog);
            switchTab('calls');
        }
    </script>
</body>
</html>
