<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; overflow: hidden; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; }
        .tab-active { border-bottom: 3px solid #128c7e; color: #128c7e; }
        .section-content { display: none; height: 100%; }
        .section-content.active { display: block; }
        .msg-bubble { cursor: pointer; transition: 0.2s; position: relative; }
        .msg-bubble:active { transform: scale(0.95); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-[#075E54] text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-4 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
            <button><i class="fas fa-search text-xl"></i></button>
            <button><i class="fas fa-ellipsis-v text-xl"></i></button>
        </div>
    </header>

    <nav class="bg-white shadow flex justify-around text-gray-500 font-bold z-40 border-b">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 flex-1 tab-active">القريبين</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 flex-1">دردشة</button>
        <button onclick="showSection('status')" id="tab-status" class="py-3 flex-1">حالات</button>
        <button onclick="showSection('calls')" id="tab-calls" class="py-3 flex-1">مكالمات</button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-24">
        <section id="section-nearby" class="section-content active p-4 space-y-4">
            <div class="bg-blue-100 p-4 rounded-xl flex items-center justify-between">
                <div><h3 class="font-bold text-blue-800">الرادار نشط</h3><p class="text-xs text-blue-600">5 كم حولك</p></div>
                <button class="bg-blue-500 text-white p-2 rounded-full"><i class="fas fa-sync"></i></button>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm flex items-center justify-between border-r-4 border-green-500">
                <div class="flex items-center">
                    <img id="my-small-pic" src="https://ui-avatars.com/api/?name=Nabeel" class="w-12 h-12 rounded-full">
                    <div class="mr-3 text-right"><h4 class="font-bold">نبيل (أنت)</h4><p class="text-xs text-green-500">نشط الآن</p></div>
                </div>
                <button onclick="openChat('أحمد')" class="bg-[#128c7e] text-white p-3 rounded-full shadow-md"><i class="fas fa-comment-dots"></i></button>
            </div>
        </section>

        <section id="section-chats" class="section-content">
            <div onclick="openChat('أحمد')" class="flex items-center p-4 bg-white border-b cursor-pointer">
                <img src="https://ui-avatars.com/api/?name=Ahmed" class="w-14 h-14 rounded-full ml-4">
                <div class="flex-1 text-right"><h4 class="font-bold">أحمد</h4><p class="text-sm text-gray-500">مرحباً نبيل!</p></div>
            </div>
        </section>

        <section id="section-status" class="section-content p-6 text-center">
            <div id="status-container" class="space-y-4">
                <p class="text-gray-400">لا توجد حالات حالياً</p>
            </div>
            <button onclick="showAddStatusMenu()" class="fixed bottom-24 left-6 bg-orange-500 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center">
                <i class="fas fa-plus"></i>
            </button>
        </section>

        <section id="section-profile" class="section-content p-8 text-center">
            <div class="relative inline-block">
                <img id="profile-img" src="https://ui-avatars.com/api/?name=Nabeel&size=128" class="w-32 h-32 rounded-full border-4 border-white shadow-xl">
                <button onclick="document.getElementById('upload-input').click()" class="absolute bottom-0 left-0 bg-[#075E54] text-white p-2 rounded-full border-2 border-white"><i class="fas fa-camera"></i></button>
                <input type="file" id="upload-input" class="hidden" onchange="syncProfile(event)">
            </div>
            <h2 class="text-2xl font-bold mt-4">نبيل</h2>
        </section>
    </main>

    <div id="chat-win" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center shadow-md">
            <button onclick="closeChat()" class="ml-4 text-xl"><i class="fas fa-arrow-right"></i></button>
            <h4 id="chat-title" class="font-bold flex-1 text-right text-lg">الاسم</h4>
            <div class="flex space-x-5 space-x-reverse mr-4">
                <button onclick="showCallMenu()"><i class="fas fa-phone"></i></button>
                <button onclick="showCallMenu()"><i class="fas fa-video"></i></button>
            </div>
        </header>
        <div id="chat-box" class="flex-1 p-4 overflow-y-auto chat-bg flex flex-col space-y-4"></div>
        <footer class="p-2 bg-gray-100 flex items-center gap-2 border-t">
            <input id="chat-input" type="text" placeholder="اكتب رسالة..." class="flex-1 p-3 rounded-full border text-right outline-none bg-white">
            <button onclick="sendLoc()" class="text-red-500 text-xl px-2"><i class="fas fa-map-marker-alt"></i></button>
            <button onmousedown="startRec()" onmouseup="stopRec()" class="text-green-600 text-xl px-2"><i class="fas fa-microphone"></i></button>
            <button onclick="send()" class="bg-[#075E54] text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md"><i class="fas fa-paper-plane"></i></button>
        </footer>
