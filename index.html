<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; overflow: hidden; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #e5ddd5; }
        .tab-active { border-bottom: 4px solid #128c7e; color: #128c7e; }
        .call-incoming { color: #25d366; }
        .call-outgoing { color: #34b7f1; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-[#075E54] text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-5 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
            <i class="fas fa-search text-xl"></i>
            <i class="fas fa-ellipsis-v text-xl"></i>
        </div>
    </header>

    <nav class="bg-white shadow flex justify-around text-gray-500 font-bold z-40">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 flex-1 tab-active">الرادار</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 flex-1">دردشة</button>
        <button onclick="showSection('status')" id="tab-status" class="py-3 flex-1">حالات</button>
        <button onclick="showSection('calls')" id="tab-calls" class="py-3 flex-1">مكالمات</button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-24">
        <section id="section-nearby" class="p-4 space-y-4">
            <h3 class="font-bold text-blue-900 border-b pb-2">مجموعات قريبة منك</h3>
            <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between border-r-4 border-green-500">
                <div class="flex items-center">
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-green-600"><i class="fas fa-users text-xl"></i></div>
                    <div class="mr-3 text-right">
                        <h4 class="font-bold">مجموعة شباب جدة</h4>
                        <p class="text-xs text-gray-400">نطاق 2 كم • 150 عضو</p>
                    </div>
                </div>
                <button onclick="openChat('مجموعة شباب جدة', true)" class="bg-[#25d366] text-white px-4 py-2 rounded-lg font-bold shadow-sm">دخول</button>
            </div>
        </section>

        <section id="section-chats" class="hidden divide-y divide-gray-100">
            <div onclick="openChat('أحمد')" class="flex items-center p-4 bg-white hover:bg-gray-50 cursor-pointer">
                <img src="https://ui-avatars.com/api/?name=Ahmed&background=075E54&color=fff" class="w-14 h-14 rounded-full">
                <div class="mr-4 flex-1 text-right">
                    <div class="flex justify-between font-bold"><h4>أحمد</h4><span class="text-xs text-gray-400 font-normal">10:45 ص</span></div>
                    <p class="text-sm text-gray-500">تطبيقك صار رهيب يا نبيل!</p>
                </div>
            </div>
        </section>

        <section id="section-status" class="hidden p-4 space-y-4">
            <div class="flex items-center p-2">
                <div class="relative">
                    <img src="https://ui-avatars.com/api/?name=Nabeel&background=random" class="w-14 h-14 rounded-full border-2 border-gray-200 p-1">
                    <button onclick="document.getElementById('status-upload').click()" class="absolute bottom-0 left-0 bg-[#25d366] text-white w-5 h-5 rounded-full flex items-center justify-center border-2 border-white"><i class="fas fa-plus text-[10px]"></i></button>
                    <input type="file" id="status-upload" class="hidden" onchange="addStatus(event)">
                </div>
                <div class="mr-4 text-right">
                    <h4 class="font-bold">حالتي</h4>
                    <p class="text-sm text-gray-400 text-right">اضغط لإضافة تحديث</p>
                </div>
            </div>
            <div id="status-list" class="space-y-3">
                <p class="text-xs text-gray-400 font-bold px-2">آخر التحديثات</p>
            </div>
        </section>

        <section id="section-calls" class="hidden p-4 space-y-4">
            <h3 class="font-bold text-gray-600 border-b pb-2">المكالمات الأخيرة</h3>
            <div id="calls-list" class="space-y-4">
                </div>
        </section>
    </main>

    <div id="chat-win" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center shadow-lg">
            <button onclick="closeChat()" class="ml-4"><i class="fas fa-arrow-right text-xl"></i></button>
            <div class="flex-1 text-right">
                <h4 id="chat-title" class="font-bold">الاسم</h4>
                <p class="text-[10px] opacity-80">متصل الآن</p>
            </div>
            <div class="flex space-x-6 space-x-reverse mr-4">
                <button onclick="makeCall('فيديو')"><i class="fas fa-video"></i></button>
                <button onclick="makeCall('صوتية')"><i class="fas fa-phone"></i></button>
            </div>
        </header>
        <div id="chat-box" class="flex-1 p-4 overflow-y-auto chat-bg flex flex-col space-y-3"></div>
        <footer class="p-2 bg-[#f0f0f0] flex items-center gap-2">
            <input id="chat-input" type="text" placeholder="اكتب رسالة..." class="flex-1 p-3
