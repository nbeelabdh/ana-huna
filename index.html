<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; }
        .tab-active { border-bottom: 3px solid white; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-[#075E54] text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold text-white">أنا هنا</h1>
        <div class="flex gap-4">
            <i class="fas fa-search text-white"></i>
            <i class="fas fa-ellipsis-v text-white"></i>
        </div>
    </header>

    <div class="bg-[#075E54] text-white flex justify-around text-sm font-bold shadow-md">
        <div class="py-3 px-6"><i class="fas fa-camera text-white"></i></div>
        <div class="py-3 px-6 tab-active">المحادثات</div>
        <div class="py-3 px-6 opacity-70">الحالة</div>
        <div class="py-3 px-6 opacity-70">الموقع</div>
    </div>

    <main class="flex-1 overflow-y-auto bg-white">
        <div onclick="alert('سيتم فتح الدردشة فور ربطها!')" class="flex items-center p-4 border-b active:bg-gray-100">
            <div class="w-14 h-14 bg-gray-300 rounded-full ml-4 flex items-center justify-center">
                <i class="fas fa-user text-2xl text-white"></i>
            </div>
            <div class="flex-1 text-right">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-gray-800 text-lg">مستخدم قريب منك</h3>
                    <span class="text-xs text-green-600 font-bold">10:45 م</span>
                </div>
                <p class="text-gray-500 text-sm truncate">اضغط لبدء الدردشة مع جارك..</p>
            </div>
        </div>

        <div onclick="alert('سيتم فتح الدردشة فور ربطها!')" class="flex items-center p-4 border-b active:bg-gray-100">
            <div class="w-14 h-14 bg-blue-100 rounded-full ml-4 flex items-center justify-center text-blue-500">
                <i class="fas fa-user-friends text-2xl"></i>
            </div>
            <div class="flex-1 text-right">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-gray-800 text-lg">مجموعة الحي</h3>
                    <span class="text-xs text-gray-400">أمس</span>
                </div>
                <p class="text-gray-500 text-sm truncate">أهلاً بك في تطبيق أنا هنا!</p>
            </div>
        </div>
    </main>

    <button class="absolute bottom-6 left-6 bg-[#25D366] text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl">
        <i class="fas fa-comment-dots text-white"></i>
    </button>

</body>
</html>
