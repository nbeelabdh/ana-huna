<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أنا هنا - النسخة المطورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; color: #334155; overflow: hidden; }
        
        section { display: none; height: calc(100vh - 70px); overflow-y: auto; }
        section.active { display: block; }
        
        /* Reels Styles */
        section#sec-reels { background-color: #000; height: 100vh; overflow: hidden; padding: 0; position: relative; }
        .reels-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .reel-video { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; border-top: 1px solid #e2e8f0; z-index: 100; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #64748b; }
        .nav-btn.active { color: #0ea5e9; }
        .reels-nav-active { background: #000; color: white; border: none; }
        .reels-nav-active .nav-btn.active { color: #fff; }

        /* Comments System */
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; border-top-left-radius: 30px; border-top-right-radius: 30px; transition: 0.4s; z-index: 400; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 -10px 25px rgba(0,0,0,0.1); }
        .bottom-sheet.open { bottom: 0; }
        .comment-item { border-right: 2px solid #e2e8f0; padding-right: 12px; margin-bottom: 16px; position: relative; }
        .reply-item { margin-right: 30px; border-right: 2px solid #3b82f6; padding-right: 10px; margin-top: 8px; font-size: 0.85rem; }
        
        /* Flags */
        .flags-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 10px 5px; scrollbar-width: none; }
        .flag-item { min-width: 55px; display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.5; transition: 0.3s; }
        .flag-item.active { opacity: 1; transform: scale(1.1); }
        .flag-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <main>
        <!-- 1. الريلز -->
        <section id="sec-reels" class="active">
            <div class="reels-container" id="reels-list">
                <div class="reel-video">
                    <video loop onclick="this.paused ? this.play() : this.pause()" playsinline autoplay muted>
                        <source src="https://v16-webapp-prime.tiktok.com/video/tos/alisg/v/0602/a9a6b986888448908868686868686868/..." type="video/mp4">
                    </video>
                    <div class="absolute bottom-24 right-4 text-white z-10">
                        <h3 class="font-bold text-lg">@نبيل_اليماني</h3>
                        <p class="text-sm opacity-80">تحديث نظام التعليقات 💬</p>
                    </div>
                    <div class="absolute bottom-24 left-4 flex flex-col gap-6 text-white text-center z-10">
                        <div onclick="toggleLike(this)" class="flex flex-col items-center cursor-pointer">
                            <i class="fas fa-heart text-2xl transition"></i><span class="text-[10px]">2.4k</span>
                        </div>
                        <div onclick="openComments()" class="flex flex-col items-center">
                            <i class="fas fa-comment text-2xl"></i><span class="text-[10px]">120</span>
                        </div>
                        <div class="bg-blue-500 w-12 h-12 rounded-full flex items-center justify-center shadow-lg">
                            <i class="fas fa-share"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 2. القريبين (محدث مع الـ ID) -->
        <section id="sec-nearby" class="p-5 bg-gray-50">
            <h2 class="text-2xl font-bold mb-6">حولك الآن</h2>
            <div id="nearby-list" class="space-y-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center gap-3 border border-gray-100">
                    <img src="https://ui-avatars.com/api/?name=Ali&background=random" class="w-12 h-12 rounded-full">
                    <div class="flex-1">
                        <h4 class="font-bold text-sm">علي محمد</h4>
                        <p class="text-[11px] text-blue-600 font-mono">#ID-99281</p>
                        <p class="text-[10px] text-gray-400">على بعد 150 متر</p>
                    </div>
                    <button class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-xs font-bold">مراسلة</button>
                </div>
            </div>
        </section>

        <!-- 3. الغرف الصوتية -->
        <section id="sec-rooms" class="p-5">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">غرف صوتية</h2>
                <button onclick="openCreateRoomModal()" class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-plus"></i></button>
            </div>
            <div class="flags-scroll mb-6" id="flags-bar"></div>
            <div id="rooms-list" class="space-y-4"></div>
        </section>

        <!-- 4. الدردشة -->
        <section id="sec-chats" class="bg-white">
            <div class="p-4 border-b">
                <input type="text" placeholder="ابحث عن صديق بالـ ID..." class="w-full bg-gray-100 p-3 rounded-xl outline-none text-sm">
            </div>
            <div class="p-10 text-center text-gray-400">
                <i class="fas fa-comments text-5xl mb-4 opacity-20"></i>
                <p>لا توجد رسائل حالياً</p>
            </div>
        </section>
    </main>

    <!-- واجهة التعليقات المتطورة -->
    <div id="comments-sheet" class="bottom-sheet">
        <div class="p-4 border-b flex justify-between items-center font-bold">
            <span>التعليقات (120)</span>
            <i class="fas fa-times text-gray-400 p-2" onclick="closeComments()"></i>
        </div>
        
        <div id="comments-list" class="flex-1 p-4 overflow-y-auto">
            <!-- سيتم إضافة التعليقات هنا -->
        </div>

        <!-- شريط الرد النشط (يظهر عند الرد على شخص) -->
        <div id="reply-indicator" class="hidden bg-blue-50 p-2 px-4 flex justify-between items-center text-xs text-blue-600 border-t">
            <span>الرد على: <b id="reply-target-name">...</b></span>
            <i class="fas fa-times-circle" onclick="cancelReply()"></i>
        </div>

        <div class="p-4 border-t flex gap-2 bg-white pb-8">
            <input type="text" id="comment-input" placeholder="اكتب تعليقك هنا..." class="flex-1 bg-gray-100 p-4 rounded-2xl outline-none text-sm border focus:border-blue-400 transition">
            <button onclick="handleCommentSubmit()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- القائمة السفلية -->
    <nav id="bottom-nav" class="reels-nav-active">
        <button onclick="switchTab('reels')" id="btn-reels" class="nav-btn active"><i class="fas fa-play-circle text-xl"></i><span>ريلز</span></button>
        <button onclick="switchTab('nearby')" id="btn-nearby" class="nav-btn"><i class="fas fa-street-view text-xl"></i><span>القريبين</span></button>
        <button onclick="switchTab('rooms')" id="btn-rooms" class="nav-btn"><i class="fas fa-microphone-alt text-xl"></i><span>الغرف</span></button>
        <button onclick="switchTab('chats')" id="btn-chats" class="nav-btn"><i class="fas fa-comment-alt text-xl"></i><span>دردشة</span></button>
    </nav>

    <script>
        let commentsData = [
            { id: 1, user: "نبيل اليماني", text: "أهلاً بكم في تطبيقي الجديد!", replies: [] }
        ];
        let replyToId = null;
        let editingId = null;

        window.onload = function() {
            renderComments();
            // إضافة دول افتراضية
            const bar = document.getElementById('flags-bar');
            const demoCountries = [{n:'اليمن', c:'ye'}, {n:'السعودية', c:'sa'}, {n:'مصر', c:'eg'}, {n:'فلسطين', c:'ps'}];
            bar.innerHTML = demoCountries.map(d => `<div class="flag-item"><img src="https://flagcdn.com/w80/${d.c}.png" class="flag-img"><span class="text-[9px] font-bold">${d.n}</span></div>`).join('');
        };

        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + tab).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
            const nav = document.getElementById('bottom-nav');
            if(tab === 'reels') nav.classList.add('reels-nav-active');
            else nav.classList.remove('reels-nav-active');
        }

        function openComments() { document.getElementById('comments-sheet').classList.add('open'); }
        function closeComments() { document.getElementById('comments-sheet').classList.remove('open'); }

        function renderComments() {
            const list = document.getElementById('comments-list');
            list.innerHTML = commentsData.map(c => `
                <div class="comment-item">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="font-bold text-sm block">${c.user}</span>
                            <p class="text-sm mt-1 text-gray-700">${c.text}</p>
                        </div>
                        <div class="flex gap-3 text-gray-400 text-xs">
                            <i class="fas fa-edit cursor-pointer hover:text-blue-500" onclick="startEdit(${c.id}, '${c.text}')"></i>
                            <i class="fas fa-trash cursor-pointer hover:text-red-500" onclick="deleteComment(${c.id})"></i>
                        </div>
                    </div>
                    <div class="mt-2 flex gap-4 text-[10px] font-bold text-gray-500">
                        <span class="text-blue-500 cursor-pointer" onclick="setReply(${c.id}, '${c.user}')">رد</span>
                        <span>منذ دقيقة</span>
                    </div>
                    ${c.replies.map(r => `
                        <div class="reply-item">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="font-bold text-[11px] block text-blue-600">${r.user}</span>
                                    <p class="mt-1">${r.text}</p>
                                </div>
                                <i class="fas fa-trash text-[10px] text-gray-300" onclick="deleteReply(${c.id}, ${r.id})"></i>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function handleCommentSubmit() {
            const inp = document.getElementById('comment-input');
            const val = inp.value.trim();
            if(!val) return;

            if (editingId) {
                // تعديل تعليق
                const comment = commentsData.find(c => c.id === editingId);
                if (comment) comment.text = val;
                editingId = null;
            } else if (replyToId) {
                // إضافة رد
                const comment = commentsData.find(c => c.id === replyToId);
                if (comment) {
                    comment.replies.push({ id: Date.now(), user: "أنا", text: val });
                }
                cancelReply();
            } else {
                // إضافة تعليق جديد
                commentsData.unshift({ id: Date.now(), user: "أنا", text: val, replies: [] });
            }

            inp.value = "";
            renderComments();
        }

        function setReply(id, name) {
            replyToId = id;
            editingId = null;
            document.getElementById('reply-indicator').classList.remove('hidden');
            document.getElementById('reply-target-name').innerText = name;
            document.getElementById('comment-input').focus();
        }

        function cancelReply() {
            replyToId = null;
            document.getElementById('reply-indicator').classList.add('hidden');
        }

        function startEdit(id, text) {
            editingId = id;
            replyToId = null;
            cancelReply();
            const inp = document.getElementById('comment-input');
            inp.value = text;
            inp.focus();
        }

        function deleteComment(id) {
            commentsData = commentsData.filter(c => c.id !== id);
            renderComments();
        }

        function deleteReply(commentId, replyId) {
            const comment = commentsData.find(c => c.id === commentId);
            if (comment) {
                comment.replies = comment.replies.filter(r => r.id !== replyId);
            }
            renderComments();
        }

        function toggleLike(el) {
            const icon = el.querySelector('i');
            icon.classList.toggle('fas');
            icon.classList.toggle('far');
            icon.style.color = icon.classList.contains('fas') ? '#ef4444' : '#fff';
        }
    </script>
</body>
</html>
