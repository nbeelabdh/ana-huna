<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا هنا - Ana Huna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .tab-active { border-bottom: 3px solid #128c7e; color: #128c7e; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-[#075E54] text-white p-4 shadow-lg flex justify-between items-center z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div class="flex space-x-4 space-x-reverse">
            <button onclick="showSection('profile')"><i class="fas fa-user-circle text-2xl"></i></button>
        </div>
    </header>

    <nav class="bg-white shadow flex justify-around text-gray-500 font-bold z-40">
        <button onclick="showSection('nearby')" id="tab-nearby" class="py-3 flex-1 tab-active">القريبين</button>
        <button onclick="showSection('chats')" id="tab-chats" class="py-3 flex-1">دردشة</button>
        <button onclick="showSection('status')" id="tab-status" class="py-3 flex-1">حالات</button>
    </nav>

    <main class="flex-1 overflow-y-auto pb-20">
        
        <section id="section-nearby" class="p-4 space-y-4">
            <div class="bg-blue-100 p-4 rounded-xl flex items-center justify-between">
                <div>
                    <h3 class="font-bold text-blue-800">رادار القريبين نشط</h3>
                    <p class="text-sm text-blue-600">يتم عرض الأشخاص والمنشآت في نطاق 5 كم</p>
                </div>
                <button class="bg-blue-500 text-white p-2 rounded-full"><i class="fas fa-sync"></i></button>
            </div>
            <div class="space-y-3">
                <div class="bg-white p-3 rounded-xl shadow-sm flex items-center justify-between">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center text-white">ن</div>
                        <div class="mr-3"><h4 class="font-bold">نبيل (أنت)</h4></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="section-profile" class="hidden p-6 text-center">
            <div class="relative inline-block">
                <img src="https://ui-avatars.com/api/?name=Nabeel&size=128" class="w-32 h-32 rounded-full border-4 border-white shadow">
                <input type="file" id="cloudUpload" class="hidden" onchange="uploadToAppwrite(this.files[0])">
                <button onclick="document.getElementById('cloudUpload').click()" class="absolute bottom-0 left-0 bg-green-500 text-white p-2 rounded-full">
                    <i class="fas fa-camera"></i>
                </button>
            </div>
            <h2 class="text-2xl font-bold mt-4">نبيل</h2>
            <div id="statusText" class="mt-2 text-sm text-blue-600"></div>
        </section>

    </main>

    <div id="chat-window" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center justify-between">
            <button onclick="closeChat()"><i class="fas fa-arrow-right"></i></button>
            <div class="flex space-x-6 space-x-reverse">
                <button onclick="startCall('فيديو')"><i class="fas fa-video text-xl"></i></button>
                <button onclick="startCall('صوتية')"><i class="fas fa-phone text-xl"></i></button>
            </div>
        </header>
        <div class="flex-1 chat-bg"></div>
    </div>

    <script>
        // --- محرك السحابة (Appwrite) ---
        const sdk = new Appwrite.Client()
            .setEndpoint('https://fra.cloud.appwrite.io/v1')
            .setProject('69ba1fa10035b7f1de96');
        const storage = new Appwrite.Storage(sdk);
        const account = new Appwrite.Account(sdk);

        async function init() { try { await account.createAnonymousSession(); } catch(e) {} }
        init();

        // دالة الرفع للسحابة دون تخريب الواجهة
        async function uploadToAppwrite(file) {
            if(!file) return;
            document.getElementById('statusText').innerText = "جاري الحفظ في السحابة...";
            try {
                await storage.createFile('69ba233f001368959e2e', 'unique()', file);
                document.getElementById('statusText').innerText = "✅ تم حفظ الملف بنجاح!";
            } catch (e) {
                document.getElementById('statusText').innerText = "❌ تأكد من أذونات Appwrite";
            }
        }

        // --- وظائف الواجهة الأصلية ---
        function showSection(id) {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
        }
        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }
        function startCall(type) { alert("جاري بدء مكالمة " + type); }
    </script>
</body>
</html>
