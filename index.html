<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أنا هنا - Cloud Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; overflow: hidden; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .tab-active { border-bottom: 4px solid #128c7e; color: #128c7e; }
        section { display: none; height: calc(100vh - 130px); overflow-y: auto; }
        section.active { display: block; }
        .msg { max-width: 80%; padding: 10px; border-radius: 15px; margin-bottom: 10px; font-size: 14px; }
        .msg-out { background-color: #dcf8c6; align-self: flex-end; border-top-left-radius: 0; shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-in { background-color: white; align-self: flex-start; border-top-right-radius: 0; shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .loader { border-top-color: #128c7e; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-[#075E54] text-white p-4 flex justify-between items-center shadow-lg z-50">
        <h1 class="text-xl font-bold">أنا هنا</h1>
        <div id="cloud-status" class="text-[10px] bg-green-500/20 px-2 py-1 rounded border border-green-500">متصل بالسحابة</div>
    </header>

    <nav class="bg-white flex shadow-md z-40">
        <button onclick="switchTab('nearby')" id="tab-nearby" class="flex-1 py-3 font-bold tab-active">القريبين</button>
        <button onclick="switchTab('chats')" id="tab-chats" class="flex-1 py-3 font-bold text-gray-500">دردشة</button>
        <button onclick="switchTab('groups')" id="tab-groups" class="flex-1 py-3 font-bold text-gray-500">مجموعات</button>
        <button onclick="switchTab('calls')" id="tab-calls" class="flex-1 py-3 font-bold text-gray-500">مكالمات</button>
    </nav>

    <main class="flex-1 relative">
        <section id="sec-nearby" class="active p-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-r-4 border-blue-500 mb-3" onclick="openChat('أحمد')">
                <div class="flex items-center">
                    <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">أ</div>
                    <div class="mr-3">
                        <h4 class="font-bold">أحمد</h4>
                        <p class="text-xs text-gray-400">نشط الآن في موقعك</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-chats" class="bg-white"></section>

        <section id="sec-groups" class="p-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold">المجموعات السحابية</h3>
                <button onclick="showGroupModal()" class="bg-orange-500 text-white px-4 py-2 rounded-xl text-sm shadow-md">إنشاء +</button>
            </div>
            <div id="groups-list" class="space-y-3"></div>
        </section>

        <section id="sec-calls" class="p-4"></section>
        
        <section id="sec-profile" class="p-6 text-center">
             <div class="relative w-32 h-32 mx-auto">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=Nabeel" class="rounded-full w-full h-full border-4 border-white shadow-xl">
                <button onclick="document.getElementById('file-picker').click()" class="absolute bottom-0 left-0 bg-[#128c7e] text-white p-2 rounded-full shadow-lg"><i class="fas fa-camera"></i></button>
             </div>
             <h2 class="mt-4 text-xl font-bold">نبيل</h2>
        </section>
    </main>

    <div id="chat-ui" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
        <header class="bg-[#075E54] text-white p-4 flex items-center shadow-md">
            <i class="fas fa-arrow-right ml-4 text-xl" onclick="closeChat()"></i>
            <div class="flex-1">
                <h4 id="active-chat-title" class="font-bold">--</h4>
                <p class="text-[10px] opacity-70">تشفير Appwrite مفعل</p>
            </div>
            <div class="flex gap-4 px-2">
                <i class="fas fa-phone"></i>
                <i class="fas fa-video"></i>
            </div>
        </header>
        <div id="messages-container" class="flex-1 chat-bg p-4 overflow-y-auto flex flex-col"></div>
        <footer class="p-2 bg-gray-50 border-t flex items-center gap-2">
            <i class="fas fa-plus text-gray-400 px-2" onclick="document.getElementById('file-picker').click()"></i>
            <input type="text" id="msg-input" placeholder="رسالة..." class="flex-1 p-2 rounded-full border border-gray-200 outline-none px-4">
            <button onclick="handleSend()" class="bg-[#128c7e] text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </div>

    <div id="group-modal" class="fixed inset-0 bg-black/50 z-[200] hidden flex items-center justify-center p-6">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="font-bold text-lg mb-4">اسم المجموعة الجديد</h3>
            <input type="text" id="group-name" class="w-full border p-3 rounded-xl mb-4 text-right bg-gray-50" placeholder="مثلاً: فريق العمل">
            <div class="flex justify-end gap-2">
                <button onclick="document.getElementById('group-modal').classList.add('hidden')" class="px-4 py-2 text-gray-400">إلغاء</button>
                <button onclick="processCreateGroup()" class="bg-orange-500 text-white px-6 py-2 rounded-xl">تأكيد</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-picker" class="hidden" onchange="uploadToCloud(this.files[0])">

    <script>
        // --- تهيئة سحابة Appwrite ---
        const client = new Appwrite.Client()
            .setEndpoint('https://fra.cloud.appwrite.io/v1')
            .setProject('69ba1fa10035b7f1de96');

        const storage = new Appwrite.Storage(client);
        const account = new Appwrite.Account(client);
        const databases = new Appwrite.Databases(client);

        // الدخول التلقائي
        async function startSession() {
            try { await account.createAnonymousSession(); } catch(e) { console.log("Session exists"); }
        }
        startSession();

        // --- نظام التنقل ---
        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + tab).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.className = "flex-1 py-3 font-bold text-gray-500");
            document.getElementById('tab-' + tab).className = "flex-1 py-3 font-bold tab-active";
        }

        // --- إدارة الدردشة ---
        function openChat(name) {
            document.getElementById('active-chat-title').innerText = name;
            document.getElementById('chat-ui').classList.remove('hidden');
            document.getElementById('messages-container').innerHTML = `<div class="text-center text-[10px] text-gray-400 my-2">بداية المحادثة مع ${name}</div>`;
        }

        function closeChat() { document.getElementById('chat-ui').classList.add('hidden'); }

        function handleSend() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val) return;

            const html = `<div class="msg msg-out shadow-sm self-end">${val}</div>`;
            document.getElementById('messages-container').insertAdjacentHTML('beforeend', html);
            input.value = "";
            const box = document.getElementById('messages-container');
            box.scrollTop = box.scrollHeight;
        }

        // --- رفع الملفات الحقيقي للسحابة ---
        async function uploadToCloud(file) {
            if(!file) return;
            const status = document.getElementById('cloud-status');
            status.innerText = "جاري الرفع...";
            status.className = "text-[10px] bg-blue-500/20 px-2 py-1 rounded border border-blue-500 animate-pulse";

            try {
                // ملاحظة: ستحتاج لإنشاء Bucket في Appwrite وإضافة الـ ID هنا بدلاً من 'default'
                const response = await storage.createFile('69ba233f001368959e2e', Appwrite.ID.unique(), file);
                const fileUrl = storage.getFileView('69ba233f001368959e2e', response.$id);
                
                if(file.type.includes('image')) {
                    const imgHtml = `<div class="msg msg-out p-1 self-end"><img src="${fileUrl}" class="rounded-lg max-h-60 shadow-md"></div>`;
                    document.getElementById('messages-container').insertAdjacentHTML('beforeend', imgHtml);
                } else {
                    const vidHtml = `<div class="msg msg-out self-end bg-blue-50">📎 فيديو تم رفعه: ${file.name}</div>`;
                    document.getElementById('messages-container').insertAdjacentHTML('beforeend', vidHtml);
                }
                
                status.innerText = "تم الرفع بنجاح ✅";
                status.className = "text-[10px] bg-green-500/20 px-2 py-1 rounded border border-green-500";
            } catch (error) {
                alert("فشل الرفع: تأكد من إعدادات الـ Bucket في Appwrite");
                status.innerText = "خطأ في السحابة ❌";
            }
        }

        // --- المجموعات الحقيقية ---
        function showGroupModal() { document.getElementById('group-modal').classList.remove('hidden'); }

        function processCreateGroup() {
            const name = document.getElementById('group-name').value.trim();
            if(!name) return;

            const list = document.getElementById('groups-list');
            const groupHtml = `
                <div onclick="openChat('${name}')" class="bg-white p-4 rounded-xl shadow-sm flex items-center border-r-4 border-orange-500 animate-slide-up">
                    <div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center font-bold">G</div>
                    <div class="mr-3 flex-1 text-right">
                        <h4 class="font-bold">${name}</h4>
                        <p class="text-xs text-gray-400">مجموعة سحابية نشطة</p>
                    </div>
                </div>`;
            list.insertAdjacentHTML('afterbegin', groupHtml);
            document.getElementById('group-modal').classList.add('hidden');
            document.getElementById('group-name').value = "";
        }
    </script>
</body>
</html>
